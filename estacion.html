<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estación — Grupo Erlo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0f1520;
    --surface2: #151d2b;
    --border: rgba(255,255,255,0.07);
    --text: #f0f4ff;
    --text-dim: #6a7a99;
    --text-mid: #a0b0cc;
    --accent-urgente: #ff4444;
    --accent-a: #ff8c00;
    --accent-b: #00b4ff;
    --accent-c: #44cc77;
    --accent-bloqueada: #cc44ff;
    --glow-urgente: rgba(255,68,68,0.25);
    --glow-a: rgba(255,140,0,0.25);
    --glow-b: rgba(0,180,255,0.25);
    --glow-c: rgba(68,204,119,0.25);
    --glow-bloqueada: rgba(204,68,255,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(10px,1.5vh,20px) clamp(16px,2.5vw,40px);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: clamp(10px,1.5vw,20px);
  }

  .logo-box {
    width: clamp(36px,4vw,56px);
    height: clamp(36px,4vw,56px);
    background: linear-gradient(135deg, #1a3a6e, #0d2244);
    border: 1px solid rgba(0,160,255,0.3);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(14px,2vw,22px);
    color: #4af;
    letter-spacing: -1px;
  }

  .company-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(14px,1.8vw,22px);
    color: var(--text-mid);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .station-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(18px,2.8vw,36px);
    color: var(--text);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  .clock-area {
    text-align: right;
  }

  .clock {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(22px,3.5vw,48px);
    color: var(--text);
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .date {
    font-size: clamp(10px,1.2vw,15px);
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: clamp(12px,2vh,28px) clamp(16px,2.5vw,40px);
    gap: clamp(10px,1.5vh,20px);
    overflow: hidden;
  }

  /* ── OP ACTIVA ── */
  .op-activa {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: clamp(16px,2.5vh,36px) clamp(20px,3vw,48px);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    transition: border-color 0.4s, box-shadow 0.4s;
  }

  .op-activa::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--prioridad-color, #444);
    border-radius: 12px 12px 0 0;
  }

  .op-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
  }

  .op-label {
    font-size: clamp(10px,1.1vw,14px);
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: clamp(4px,0.8vh,10px);
  }

  .op-sku {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(28px,5.5vw,88px);
    line-height: 1;
    color: var(--text);
    max-width: 75%;
  }

  .prioridad-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(12px,1.6vw,22px);
    padding: clamp(4px,0.6vh,8px) clamp(10px,1.2vw,18px);
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
    border: 1px solid;
    flex-shrink: 0;
  }

  .op-meta {
    display: flex;
    gap: clamp(20px,4vw,60px);
    align-items: flex-end;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .meta-label {
    font-size: clamp(9px,1vw,13px);
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .meta-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(20px,3.5vw,52px);
    line-height: 1;
    color: var(--text);
  }

  .meta-value.highlight {
    color: var(--prioridad-color, var(--text));
  }

  /* ── BARRA PROGRESO ── */
  .progress-section {
    display: flex;
    flex-direction: column;
    gap: clamp(6px,1vh,12px);
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .progress-title {
    font-size: clamp(10px,1.1vw,14px);
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .progress-pct {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(16px,2.2vw,30px);
    color: var(--prioridad-color, var(--text));
  }

  .progress-track {
    height: clamp(12px,1.8vh,24px);
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    overflow: hidden;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    border-radius: 100px;
    background: var(--prioridad-color, #444);
    box-shadow: 0 0 20px var(--prioridad-glow, transparent);
    transition: width 1s ease;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent 60%, rgba(255,255,255,0.15));
    border-radius: 100px;
  }

  /* ── COLA DE OPs ── */
  .cola {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: clamp(10px,1.5vh,20px) clamp(16px,2vw,28px);
    flex-shrink: 0;
  }

  .cola-title {
    font-size: clamp(9px,1vw,13px);
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: clamp(8px,1vh,14px);
  }

  .cola-items {
    display: flex;
    gap: clamp(8px,1.5vw,20px);
    overflow: hidden;
  }

  .cola-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: clamp(8px,1.2vh,14px) clamp(12px,1.5vw,20px);
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .cola-sku {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(13px,1.6vw,22px);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .cola-cant {
    font-size: clamp(10px,1.1vw,14px);
    color: var(--text-dim);
  }

  .cola-badge {
    font-size: clamp(9px,0.9vw,12px);
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    align-self: flex-start;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ── ESTADO SIN OP ── */
  .sin-op {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(16px,3vh,40px);
    text-align: center;
  }

  .sin-op-logo {
    width: clamp(80px,12vw,160px);
    height: clamp(80px,12vw,160px);
    background: linear-gradient(135deg, #1a3a6e, #0d2244);
    border: 2px solid rgba(0,160,255,0.2);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(32px,6vw,72px);
    color: #4af;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,160,255,0); }
    50% { opacity: 0.85; box-shadow: 0 0 40px 8px rgba(0,160,255,0.12); }
  }

  .sin-op-msg {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(18px,3vw,42px);
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .sin-op-frase {
    font-size: clamp(14px,1.8vw,24px);
    color: rgba(160,176,204,0.6);
    max-width: 600px;
    line-height: 1.5;
    font-style: italic;
  }

  /* ── FOOTER ── */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(6px,1vh,12px) clamp(16px,2.5vw,40px);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .refresh-info {
    font-size: clamp(9px,1vw,13px);
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #44cc77;
    display: inline-block;
    margin-right: 6px;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .cambiar-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: clamp(4px,0.6vh,8px) clamp(8px,1vw,14px);
    color: var(--text-dim);
    font-family: 'Barlow', sans-serif;
    font-size: clamp(9px,1vw,13px);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }

  .cambiar-btn:hover {
    border-color: rgba(0,160,255,0.4);
    color: #4af;
  }

  .updated-at {
    font-size: clamp(9px,1vw,12px);
    color: var(--text-dim);
  }

  /* ── SETUP SCREEN ── */
  .setup-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid rgba(0,160,255,0.2);
    border-radius: 16px;
    padding: 48px;
    width: min(600px, 90vw);
    text-align: center;
  }

  .setup-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 36px;
    color: var(--text);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .setup-sub {
    color: var(--text-dim);
    font-size: 15px;
    margin-bottom: 36px;
  }

  .setup-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }

  .setup-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 10px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }

  .setup-btn:hover, .setup-btn.selected {
    background: rgba(0,160,255,0.1);
    border-color: rgba(0,160,255,0.4);
    color: #4af;
  }

  .setup-btn span {
    display: block;
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    letter-spacing: 0;
  }

  .setup-confirm {
    background: rgba(0,160,255,0.15);
    border: 1px solid rgba(0,160,255,0.4);
    border-radius: 10px;
    padding: 14px 32px;
    color: #4af;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.2s;
  }

  .setup-confirm:hover {
    background: rgba(0,160,255,0.25);
  }

  .setup-reset {
    margin-top: 14px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
  }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div class="setup-screen" id="setupScreen">
  <div class="setup-card">
    <div class="setup-title">Configurar estación</div>
    <div class="setup-sub">Seleccioná la estación de esta pantalla. La configuración se guarda automáticamente.</div>
    <div class="setup-grid" id="setupGrid"></div>
    <button class="setup-confirm" onclick="confirmarEstacion()">Confirmar</button>
    <br>
    <button class="setup-reset" onclick="resetConfig()">Restablecer configuración</button>
  </div>
</div>

<script>
// ── CONFIGURACIÓN ──
const DATA_URL = 'https://csotoajoy.github.io/grupoerlo/ps_all.json';
const REFRESH_MS = 30000;

const ESTACIONES = [
  { id: 'A-Cambio de Molde',         label: 'A-Cambio de Molde',         desc: 'Cambio de molde en Estación B' },
  { id: 'A-Preparar Resina',         label: 'A-Preparar Resina',         desc: 'Pesaje y preparación de resina' },
  { id: 'B-Inyección Soplado',       label: 'B-Inyección Soplado',       desc: 'Sopladora · Inyectoras · Ametralladora' },
  { id: 'B-Maquina Bolitas',         label: 'B-Maquina Bolitas',         desc: 'Producción de esferas roll-on' },
  { id: 'C-Etiquetado y Serigrafía', label: 'C-Etiquetado y Serigrafía', desc: 'Etiquetadoras · Serigrafía' },
  { id: 'C-Armar Tapas',             label: 'C-Armar Tapas',             desc: 'Proceso CAT' },
  { id: 'D-Llenado',                 label: 'D-Llenado',                 desc: 'Roll-on · Crema · Talco · Shampoo · Gel · Perfumes' },
  { id: 'A-Quimico',                 label: 'A-Quimico',                 desc: 'Producción de fórmula química' },
  { id: 'G-Mantenimiento',           label: 'G-Mantenimiento',           desc: 'Mantenimiento de máquinas' },
];

const FRASES_5S = [
  'Un lugar para cada cosa, y cada cosa en su lugar.',
  'La limpieza es el primer paso hacia la calidad.',
  'Organización hoy, eficiencia mañana.',
  'El orden en planta refleja el orden en la mente.',
  'Eliminar lo innecesario libera espacio para lo importante.',
  'Estandarizar hoy evita errores mañana.',
  'La disciplina convierte los buenos hábitos en rutina.',
  'El tiempo invertido en orden se recupera en productividad.',
  'Una planta limpia es una planta segura.',
  'Seiso: limpiar es inspeccionar.',
];

const PRIORIDAD_CFG = {
  'URGENTE':   { color: '#ff4444', glow: 'rgba(255,68,68,0.3)',   bg: 'rgba(255,68,68,0.12)',   border: 'rgba(255,68,68,0.4)' },
  'A':         { color: '#ff8c00', glow: 'rgba(255,140,0,0.3)',   bg: 'rgba(255,140,0,0.12)',   border: 'rgba(255,140,0,0.4)' },
  'B':         { color: '#00b4ff', glow: 'rgba(0,180,255,0.3)',   bg: 'rgba(0,180,255,0.12)',   border: 'rgba(0,180,255,0.4)' },
  'C':         { color: '#44cc77', glow: 'rgba(68,204,119,0.3)',  bg: 'rgba(68,204,119,0.12)',  border: 'rgba(68,204,119,0.4)' },
  'BLOQUEADA': { color: '#cc44ff', glow: 'rgba(204,68,255,0.3)',  bg: 'rgba(204,68,255,0.12)',  border: 'rgba(204,68,255,0.4)' },
};

// ── ESTADO ──
let estacionActual = localStorage.getItem('erlo_estacion') || null;
let fraseIdx = Math.floor(Math.random() * FRASES_5S.length);
let logoTurn = 0;
let sinOpInterval = null;
let data = null;

// ── SETUP ──
function initSetup() {
  const grid = document.getElementById('setupGrid');
  grid.innerHTML = '';
  ESTACIONES.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'setup-btn' + (estacionActual === e.id ? ' selected' : '');
    btn.innerHTML = `${e.label}<span>${e.desc}</span>`;
    btn.onclick = () => {
      document.querySelectorAll('.setup-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      estacionActual = e.id;
    };
    grid.appendChild(btn);
  });
}

function confirmarEstacion() {
  if (!estacionActual) return;
  localStorage.setItem('erlo_estacion', estacionActual);
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('stationLabel').textContent = estacionActual;
  iniciar();
}

function cambiarEstacion() {
  if (sinOpInterval) { clearInterval(sinOpInterval); sinOpInterval = null; }
  document.getElementById("setupScreen").style.display = "flex";
  initSetup();
}

function resetConfig() {
  localStorage.removeItem('erlo_estacion');
  estacionActual = null;
  initSetup();
}

// ── RELOJ ──
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}`;
  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  document.getElementById('dateLabel').textContent =
    `${dias[now.getDay()]} ${now.getDate()} ${meses[now.getMonth()]} ${now.getFullYear()}`;
}

// ── FETCH DATOS ──
async function fetchData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
    document.getElementById('statusDot').style.background = '#44cc77';
    document.getElementById('refreshInfo').textContent = 'En vivo · actualiza cada 30s';
    if (data.actualizado) {
      const d = new Date(data.actualizado);
      document.getElementById('updatedAt').textContent =
        'Datos: ' + d.toLocaleTimeString('es-CR', { hour: '2-digit', minute: '2-digit' });
    }
    render();
  } catch(e) {
    document.getElementById('statusDot').style.background = '#ff4444';
    document.getElementById('refreshInfo').textContent = 'Sin conexión · reintentando…';
  }
}

// ── HELPERS ──
function redondearBloques25(kilos) {
  return Math.max(25, Math.ceil(kilos / 25) * 25);
}
function unidsDesdeKilos(kilos, pesoGr) {
  if (!pesoGr || pesoGr <= 0) return null;
  return Math.floor((kilos * 1000) / pesoGr);
}

// ── RENDER ──
function render() {
  if (!data || !estacionActual) return;
  const ORDEN_EST = ['A-Cambio de Molde','A-Preparar Resina','B-Inyección Soplado',
    'B-Maquina Bolitas','C-Armar Tapas','C-Etiquetado y Serigrafía','D-Llenado','A-Quimico'];
  let ops = (data.ordenes || data.ops || []).filter(op =>
    op.estacion === estacionActual && op.estado !== 'Completada'
  );
  ops.sort((a,b) => {
    const pp = {'URGENTE':0,'A':1,'B':2,'C':3,'BLOQUEADA':4};
    return (pp[a.prioridad]||9) - (pp[b.prioridad]||9);
  });
  const activa = ops.find(op => op.estado === 'En Producción') ||
                 ops.find(op => op.estado === 'Pausada') || ops[0] || null;
  const cola = ops.filter(op => op !== activa).slice(0, 4);
  const main = document.getElementById('mainContent');
  if (sinOpInterval) { clearInterval(sinOpInterval); sinOpInterval = null; }
  if (!activa) renderSinOP(main);
  else renderOP(main, activa, cola);
}


function renderOP(container, op, cola) {
  const cfg  = PRIORIDAD_CFG[op.prioridad] || PRIORIDAD_CFG['C'];
  const est  = op.estacion || '';
  const sku  = op.sku || op.productoSku || op.producto_sku || '';
  const opCode    = op.opCode || op['OP Code'] || '';
  const kilos     = parseFloat(op.kilosResina || op['Kilos Resina'] || 0);
  const masterB   = op.master_batch || op['Master Batch'] || op.masterBatch || '';
  const tipoRes   = op.tipo_resina || op['Tipo de Resina'] || op.tipoResina || '';
  const maquina   = op.maquina || op.Maquina || '';
  const molde     = op.molde || op.Molde || '';
  const justif    = op['Justificación'] || op.justificacion || '';
  const cantidad  = parseFloat(op.cantidad || 0);
  const undsMeta  = parseFloat(op['Unds Meta'] || op.undsMeta || 0);
  const stockPT   = parseFloat(op.stockPT || 0);
  const pct       = undsMeta > 0 ? Math.min(100, Math.round((stockPT/undsMeta)*100)) : 0;

  let body = '';

  if (est === 'A-Cambio de Molde') {
    body = `
      <div class="op-header">
        <div style="flex:1;min-width:0">
          <div class="op-label">A — Cambio de Molde</div>
          <div class="op-sku" style="font-size:clamp(22px,4vw,64px)">${molde || sku}</div>
          ${maquina?`<div style="font-size:clamp(12px,1.5vw,20px);color:var(--text-mid);margin-top:6px">Máquina: ${maquina}</div>`:''}
        </div>
        <div class="prioridad-badge" style="color:${cfg.color};background:${cfg.bg};border-color:${cfg.border}">${op.prioridad}</div>
      </div>
      <div class="op-meta">
        <div class="meta-item"><div class="meta-label">Responsable</div><div class="meta-value" style="font-size:clamp(14px,2vw,30px)">Jasson</div></div>
        <div class="meta-item" style="margin-left:auto"><div class="meta-label">Estado</div><div class="meta-value" style="font-size:clamp(13px,1.8vw,26px);color:${cfg.color}">${op.estado||'Pendiente'}</div></div>
      </div>`;

  } else if (est === 'A-Preparar Resina') {
    const kb = redondearBloques25(kilos || cantidad);
    const pt = justif.match(/PT: ([^|]+)/)?.[1]?.trim() || sku;
    body = `
      <div class="op-header">
        <div style="flex:1;min-width:0">
          <div class="op-label">A — Preparar Resina${op.estado==='Pausada'?' · PAUSADA':''}</div>
          <div class="op-sku" style="font-size:clamp(22px,4vw,64px)">${tipoRes || sku}</div>
          <div style="font-size:clamp(11px,1.4vw,18px);color:var(--text-dim);margin-top:6px">Para: ${pt}</div>
        </div>
        <div class="prioridad-badge" style="color:${cfg.color};background:${cfg.bg};border-color:${cfg.border}">${op.prioridad}</div>
      </div>
      <div class="op-meta" style="flex-wrap:wrap;gap:clamp(14px,3vw,48px)">
        <div class="meta-item">
          <div class="meta-label">Kilos a preparar</div>
          <div class="meta-value highlight">${kb} <span style="font-size:.45em;color:var(--text-dim)">kg</span></div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:2px">Bloques de 25 kg</div>
        </div>
        ${masterB?`<div class="meta-item"><div class="meta-label">Master Batch</div><div class="meta-value" style="font-size:clamp(14px,2.2vw,32px);color:#f59e0b">${masterB}</div></div>`:''}
        ${molde?`<div class="meta-item"><div class="meta-label">Molde asignado</div><div class="meta-value" style="font-size:clamp(13px,1.8vw,26px)">${molde}</div></div>`:''}
        <div class="meta-item" style="margin-left:auto"><div class="meta-label">Estado</div><div class="meta-value" style="font-size:clamp(13px,1.8vw,26px);color:${cfg.color}">${op.estado||'Pendiente'}</div></div>
      </div>`;

  } else if (est === 'B-Inyección Soplado' || est === 'B-Maquina Bolitas') {
    const kb = redondearBloques25(kilos || cantidad);
    const pesoGr = est==='B-Maquina Bolitas' ? 3 : sku.includes('75') ? 16 : 8;
    const aproxUnds = unidsDesdeKilos(kb, pesoGr);
    body = `
      <div class="op-header">
        <div style="flex:1;min-width:0">
          <div class="op-label">${est}${op.estado==='Pausada'?' · PAUSADA':''}</div>
          <div class="op-sku">${sku}</div>
          ${maquina?`<div style="font-size:clamp(12px,1.5vw,20px);color:var(--text-mid);margin-top:4px">${maquina}${molde?' · '+molde:''}</div>`:''}
        </div>
        <div class="prioridad-badge" style="color:${cfg.color};background:${cfg.bg};border-color:${cfg.border}">${op.prioridad}</div>
      </div>
      <div class="op-meta" style="flex-wrap:wrap;gap:clamp(14px,3vw,48px)">
        <div class="meta-item">
          <div class="meta-label">Kilos de resina</div>
          <div class="meta-value highlight">${kb} <span style="font-size:.45em;color:var(--text-dim)">kg</span></div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:2px">≈ ${aproxUnds?formatNum(aproxUnds)+' uds':'—'}</div>
        </div>
        ${masterB?`<div class="meta-item"><div class="meta-label">Master Batch</div><div class="meta-value" style="font-size:clamp(13px,1.8vw,26px);color:#f59e0b">${masterB}</div></div>`:''}
        ${tipoRes?`<div class="meta-item"><div class="meta-label">Resina</div><div class="meta-value" style="font-size:clamp(12px,1.6vw,22px)">${tipoRes}</div></div>`:''}
        <div class="meta-item" style="margin-left:auto"><div class="meta-label">Estado</div><div class="meta-value" style="font-size:clamp(13px,1.8vw,26px);color:${cfg.color}">${op.estado||'Pendiente'}</div></div>
      </div>`;

  } else if (est === 'C-Etiquetado y Serigrafía' || est === 'C-Armar Tapas') {
    // Buscar stock de envases en inventario SKU
    const skuItems = (data.inventario_sku || []);
    const keyword = sku.replace(/ROLL ON|75ML|50ML|\d{2}-\d{2}/gi,'').trim().split(' ').filter(w=>w.length>3)[0]||'';
    const matches = keyword ? skuItems.filter(s => s.descripcion && s.descripcion.toLowerCase().includes(keyword.toLowerCase())) : [];
    const envBase = matches.find(s=>(s.status||'').toLowerCase()==='envase');
    const envEtiq = matches.find(s=>(s.status||'').toLowerCase().includes('etiquetado'));
    body = `
      <div class="op-header">
        <div style="flex:1;min-width:0">
          <div class="op-label">${est}${op.estado==='Pausada'?' · PAUSADA':''}</div>
          <div class="op-sku">${sku}</div>
          ${opCode?`<div style="font-size:clamp(10px,1.2vw,15px);color:var(--text-dim);margin-top:4px">${opCode}</div>`:''}
        </div>
        <div class="prioridad-badge" style="color:${cfg.color};background:${cfg.bg};border-color:${cfg.border}">${op.prioridad}</div>
      </div>
      <div class="op-meta" style="flex-wrap:wrap;gap:clamp(14px,3vw,48px)">
        <div class="meta-item"><div class="meta-label">Uds a etiquetar</div><div class="meta-value highlight">${formatNum(cantidad)}</div></div>
        ${envBase?`<div class="meta-item"><div class="meta-label">${envBase.descripcion}</div><div class="meta-value" style="font-size:clamp(14px,2vw,28px);color:${parseFloat(envBase.unds||0)>0?'#44cc77':'#ff4444'}">${formatNum(Math.max(0,parseFloat(envBase.unds||0)))}</div></div>`:''}
        ${envEtiq?`<div class="meta-item"><div class="meta-label">${envEtiq.descripcion}</div><div class="meta-value" style="font-size:clamp(14px,2vw,28px);color:#a0b0cc">${formatNum(Math.max(0,parseFloat(envEtiq.unds||0)))}</div></div>`:''}
        <div class="meta-item" style="margin-left:auto"><div class="meta-label">Estado</div><div class="meta-value" style="font-size:clamp(13px,1.8vw,26px);color:${cfg.color}">${op.estado||'Pendiente'}</div></div>
      </div>
      ${pct>0?`<div class="progress-section" style="margin-top:clamp(12px,2vh,28px)"><div class="progress-header"><div class="progress-title">Progreso</div><div class="progress-pct">${pct}%</div></div><div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${cfg.color};box-shadow:0 0 16px ${cfg.glow}"></div></div></div>`:''}`;

  } else {
    // D-Llenado, A-Quimico, otros
    body = `
      <div class="op-header">
        <div style="flex:1;min-width:0">
          <div class="op-label">${est}${op.estado==='Pausada'?' · PAUSADA':''}</div>
          <div class="op-sku">${sku}</div>
          ${opCode?`<div style="font-size:clamp(10px,1.2vw,15px);color:var(--text-dim);margin-top:4px">${opCode}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
          <div class="prioridad-badge" style="color:${cfg.color};background:${cfg.bg};border-color:${cfg.border}">${op.prioridad}</div>
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:clamp(16px,2.5vw,36px)">${formatNum(cantidad)} <span style="font-size:.5em;color:var(--text-dim)">${op.unidad_produccion||'uds'}</span></div>
        </div>
      </div>
      <div class="op-meta">
        <div class="meta-item"><div class="meta-label">Cantidad</div><div class="meta-value highlight">${formatNum(cantidad)}</div></div>
        <div class="meta-item" style="margin-left:auto"><div class="meta-label">Estado</div><div class="meta-value" style="font-size:clamp(13px,1.8vw,26px);color:${cfg.color}">${op.estado||'Pendiente'}</div></div>
      </div>
      ${pct>0?`<div class="progress-section" style="margin-top:clamp(12px,2vh,28px)"><div class="progress-header"><div class="progress-title">Progreso</div><div class="progress-pct">${pct}%</div></div><div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${cfg.color};box-shadow:0 0 16px ${cfg.glow}"></div></div></div>`:''}
      ${justif?`<div style="margin-top:clamp(8px,1.5vh,20px);padding:10px 14px;background:rgba(255,255,255,.04);border-radius:8px;font-size:clamp(10px,1.1vw,14px);color:var(--text-dim);line-height:1.5">${justif}</div>`:''}`;
  }

  container.innerHTML = `
    <div class="op-activa" id="opCard" style="--prioridad-color:${cfg.color};--prioridad-glow:${cfg.glow};border-color:${cfg.border};box-shadow:0 0 40px ${cfg.glow}">
      ${body}
    </div>
    ${cola.length>0?`<div class="cola"><div class="cola-title">En cola (${cola.length})</div><div class="cola-items">${cola.map(o=>{
      const c=PRIORIDAD_CFG[o.prioridad]||PRIORIDAD_CFG['C'];
      const nom=o.sku||o.productoSku||'—';
      const kb=['A-Preparar Resina','B-Inyección Soplado','B-Maquina Bolitas'].includes(o.estacion);
      const cant=kb?`${redondearBloques25(parseFloat(o.kilosResina||o.cantidad||0))} kg`:`${formatNum(parseFloat(o.cantidad||0))} uds`;
      return `<div class="cola-item"><div class="cola-badge" style="background:${c.bg};color:${c.color};border:1px solid ${c.border}">${o.prioridad}</div><div class="cola-sku">${nom}</div><div class="cola-cant">${cant}</div></div>`;
    }).join('')}</div></div>`:''}`;
}

function formatNum(n) {
  if (!n && n !== 0) return '—';
  return Number(n).toLocaleString('es-CR');
}

// ── INICIO ──
function iniciar() {
  fetchData();
  setInterval(fetchData, REFRESH_MS);
}

// ── BOOT ──
updateClock();
setInterval(updateClock, 1000);
initSetup();

if (estacionActual) {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('stationLabel').textContent = estacionActual;
  iniciar();
}
