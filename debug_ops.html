<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Diagnóstico ERLO</title>
  <style>
    body { background:#0a0c10; color:#e8eaf6; font-family:monospace; padding:16px }
    .ok { color:#00e676 }
    .err { color:#ff1744 }
    pre { white-space:pre-wrap; word-break:break-word; background:#111520; padding:12px; border:1px solid #1e2535 }
  </style>
</head>
<body>

<h2>Diagnóstico carga ps_ops.json</h2>
<div id="status">Iniciando…</div>
<pre id="out"></pre>

<script>
const URL = 'https://raw.githubusercontent.com/Csotoajoy/grupoerlo/main/ps_ops.json';

(async function(){
  try {
    const res = await fetch(URL + '?t=' + Date.now());
    const data = await res.json();

    document.getElementById('status').innerHTML =
      '<span class="ok">OK: JSON cargado</span><br>' +
      'Tipo: ' + (Array.isArray(data) ? 'Array' : typeof data) + '<br>' +
      'Longitud: ' + (Array.isArray(data) ? data.length : 'N/A');

    // Muestra las primeras 2 filas tal cual vienen
    document.getElementById('out').textContent =
      JSON.stringify(data.slice(0, 2), null, 2);

  } catch (e) {
    document.getElementById('status').innerHTML =
      '<span class="err">ERROR JS:</span> ' + e.message;
    console.error(e);
  }
})();
</script>

</body>
</html>
