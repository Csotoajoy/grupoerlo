<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supervisor — Grupo Erlo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070b11;
    --surface: #0e1520;
    --surface2: #131d2c;
    --surface3: #182030;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #eef2ff;
    --text-dim: #4a5a78;
    --text-mid: #8090b0;
    --green: #2ecc71;
    --amber: #f39c12;
    --red: #e74c3c;
    --blue: #3498db;
    --purple: #9b59b6;
    --accent: #0080ff;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    gap: 16px;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .logo-box {
    width: 40px; height: 40px;
    background: linear-gradient(135deg,#1a3a6e,#0d2244);
    border: 1px solid rgba(0,128,255,0.3);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 16px; color: #4af;
  }

  .company { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; color:var(--text-mid); text-transform:uppercase; letter-spacing:.05em; }
  .page-sub { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.1em; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }

  .tab-btn {
    background: none;
    border: none;
    border-radius: 6px;
    padding: 7px 16px;
    color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: .05em;
    transition: all .2s;
    white-space: nowrap;
  }

  .tab-btn:hover { color: var(--text-mid); background: var(--surface3); }
  .tab-btn.active { background: var(--accent); color: #fff; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .clock {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 28px; line-height:1;
  }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    animation: blink 2s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--text-mid);
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
  }

  .refresh-btn:hover { border-color: var(--accent); color: #4af; }

  /* ── CONTENT ── */
  .content {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .tab-panel {
    display: none;
    flex: 1;
    overflow: hidden;
    flex-direction: column;
  }

  .tab-panel.active { display: flex; }

  /* ── PANEL HEADER ── */
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }

  .panel-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 16px;
    color: var(--text-mid); text-transform: uppercase; letter-spacing:.05em;
  }

  /* ─────────────────────────────────────────
     MÓDULO 1 — GANTT
  ───────────────────────────────────────── */
  .gantt-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .gantt-machine {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .gantt-machine-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .machine-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 15px;
    color: var(--text); text-transform: uppercase; letter-spacing:.05em;
  }

  .machine-ops-count {
    font-size: 12px; color: var(--text-dim);
  }

  .gantt-ops {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .gantt-op-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 100px 80px 80px;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    border-left: 3px solid;
    transition: border-color .2s;
  }

  .gantt-op-row:hover { background: var(--surface3); }

  .op-sku-gantt {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 15px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .op-cell {
    font-size: 12px; color: var(--text-mid);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .op-cell-label {
    font-size: 10px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing:.08em;
    display: block; margin-bottom: 2px;
  }

  .pill-sm {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 11px;
    padding: 3px 8px; border-radius: 4px;
    text-transform: uppercase; letter-spacing:.05em;
    display: inline-block;
  }

  .gantt-empty {
    padding: 16px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* alerta tiempo muerto */
  .idle-alert {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: rgba(231,76,60,0.1);
    border: 1px solid rgba(231,76,60,0.2);
    border-radius: 6px;
    font-size: 12px;
    color: #ff6b6b;
    margin: 0 12px 8px;
  }

  /* ─────────────────────────────────────────
     MÓDULO 2 — DISPONIBILIDAD
  ───────────────────────────────────────── */
  .disp-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
  }

  .disp-table {
    width: 100%;
    border-collapse: collapse;
  }

  .disp-table th {
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing:.1em;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
  }

  .disp-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }

  .disp-table tr:hover td { background: var(--surface2); }

  .semaforo {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    flex-shrink: 0;
  }

  .sku-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 14px;
  }

  .num-cell {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 15px;
    text-align: right;
  }

  .bar-cell { width: 160px; }

  .mini-bar-track {
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    overflow: hidden;
  }

  .mini-bar-fill {
    height: 100%;
    border-radius: 100px;
  }

  /* ─────────────────────────────────────────
     MÓDULO 3 — INSUMOS
  ───────────────────────────────────────── */
  .insumos-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .insumos-filter {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 14px;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .filter-btn.active, .filter-btn:hover {
    background: var(--surface3);
    color: var(--text);
    border-color: var(--border2);
  }

  .filter-btn.f-red.active { border-color: rgba(231,76,60,.5); color: var(--red); }
  .filter-btn.f-amber.active { border-color: rgba(243,156,18,.5); color: var(--amber); }
  .filter-btn.f-green.active { border-color: rgba(46,204,113,.5); color: var(--green); }

  .insumos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
    overflow-y: auto;
    flex: 1;
  }

  .insumo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    border-left: 3px solid;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .insumo-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 14px;
    line-height: 1.2;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .insumo-tipo {
    font-size: 10px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing:.08em;
  }

  .insumo-stock {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 22px;
    line-height: 1; margin-top: 4px;
  }

  .insumo-minimo {
    font-size: 11px; color: var(--text-dim);
  }

  /* ─────────────────────────────────────────
     MÓDULO 4 — KPIs
  ───────────────────────────────────────── */
  .kpis-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .kpi-card-label {
    font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing:.1em;
  }

  .kpi-card-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 44px; line-height:1;
  }

  .kpi-card-sub {
    font-size: 12px; color: var(--text-dim);
  }

  .por-estacion-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 14px;
    color: var(--text-mid); text-transform: uppercase; letter-spacing:.05em;
    margin-bottom: 8px;
  }

  .est-kpi-row {
    display: grid;
    grid-template-columns: 200px 1fr 80px 80px 100px;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
  }

  .est-kpi-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 14px;
  }

  .est-kpi-bar-track {
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    overflow: hidden;
  }

  .est-kpi-bar-fill {
    height: 100%;
    border-radius: 100px;
    background: var(--accent);
    transition: width .8s ease;
  }

  .est-kpi-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 15px;
    text-align: right;
  }

  /* ── DISPONIBILIDAD CON CATEGORÍAS ── */
  .disp-filtros {
    display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
  }
  .disp-cat-btn {
    padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border2); background: transparent;
    color: var(--text-dim); cursor: pointer; transition: .15s;
    font-family: 'Barlow', sans-serif; text-transform: uppercase; letter-spacing: .04em;
  }
  .disp-cat-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .disp-cat-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  .disp-wrap { flex: 1; overflow-y: auto; padding: 16px 24px; display: flex; flex-direction: column; gap: 10px; }

  /* Summary cards de categoría */
  .disp-cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }

  .disp-cat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: .15s;
  }
  .disp-cat-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .disp-cat-card.expandida { border-color: var(--accent); }

  .dcc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .dcc-nombre { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; }
  .dcc-pct { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 20px; }
  .dcc-sub { display: flex; gap: 10px; font-size: 10px; color: var(--text-dim); margin-bottom: 6px; }
  .dcc-track { height: 5px; background: rgba(255,255,255,.06); border-radius: 100px; overflow: hidden; }
  .dcc-fill  { height: 100%; border-radius: 100px; transition: width .4s; }
  .dcc-dots  { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .dcc-dot   { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* Detalle expandido de una categoría */
  .disp-detalle {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
  }
  .disp-detalle-header {
    display: grid;
    grid-template-columns: 1fr 90px 90px 90px 100px;
    padding: 7px 14px; background: var(--surface3);
    border-bottom: 1px solid var(--border);
    font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .06em;
    gap: 8px;
  }
  .disp-detalle-row {
    display: grid;
    grid-template-columns: 1fr 90px 90px 90px 100px;
    padding: 8px 14px; border-bottom: 1px solid var(--border);
    align-items: center; gap: 8px; transition: .1s;
  }
  .disp-detalle-row:last-child { border-bottom: none; }
  .disp-detalle-row:hover { background: rgba(255,255,255,.02); }
  .ddr-nombre { font-size: 12px; line-height: 1.3; }
  .ddr-cod { font-size: 10px; color: var(--text-dim); }
  .ddr-num { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; text-align: right; }
  .ddr-bar { display: flex; align-items: center; gap: 6px; }
  .ddr-bar-track { flex: 1; height: 4px; background: rgba(255,255,255,.06); border-radius: 100px; overflow: hidden; }
  .ddr-bar-fill  { height: 100%; border-radius: 100px; }
  .ddr-bar-pct   { font-size: 10px; font-weight: 700; min-width: 30px; text-align: right; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo-area">
    <div class="logo-box">GE</div>
    <div>
      <div class="company">Grupo Erlo</div>
      <div class="page-sub">Vista Supervisor</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('gantt')">① Cadenas</button>
    <button class="tab-btn" onclick="switchTab('disp')">② Disponibilidad</button>
    <button class="tab-btn" onclick="switchTab('insumos')">③ Insumos</button>
    <button class="tab-btn" onclick="switchTab('kpis')">④ KPIs</button>
  </div>

  <div class="header-right">
    <span class="status-dot" id="statusDot"></span>
    <div class="clock" id="clock">00:00</div>
    <button class="refresh-btn" onclick="fetchAll()">↻ Actualizar</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- ── TAB 1: GANTT ── -->
  <div class="tab-panel active" id="panel-gantt">
    <div class="panel-header">
      <div class="panel-title">Monitor de cadenas de producción</div>
      <div style="font-size:12px;color:var(--text-dim)" id="ganttUpdated"></div>
    </div>
    <div class="gantt-wrap" id="ganttWrap">
      <div style="color:var(--text-dim);text-align:center;padding:40px">Cargando…</div>
    </div>
  </div>

  <!-- ── TAB 2: DISPONIBILIDAD ── -->
  <div class="tab-panel" id="panel-disp">
    <div class="panel-header">
      <div class="panel-title">Disponibilidad vs Pedidos</div>
      <div class="disp-filtros" id="dispFiltros">
        <button class="disp-cat-btn active" onclick="setDispCat('TODAS',this)">Todas</button>
      </div>
    </div>
    <div class="disp-wrap" id="dispWrap">
      <div style="color:var(--text-dim);text-align:center;padding:40px">Cargando…</div>
    </div>
  </div>

  <!-- ── TAB 3: INSUMOS ── -->
  <div class="tab-panel" id="panel-insumos">
    <div class="panel-header">
      <div class="panel-title">Inventario de insumos</div>
      <div class="insumos-filter">
        <button class="filter-btn f-red active" onclick="setFilter('all', this)">Todos</button>
        <button class="filter-btn f-red" onclick="setFilter('red', this)">🔴 Sin stock</button>
        <button class="filter-btn f-amber" onclick="setFilter('amber', this)">🟡 Bajo</button>
        <button class="filter-btn f-green" onclick="setFilter('green', this)">🟢 OK</button>
      </div>
    </div>
    <div class="insumos-wrap">
      <div class="insumos-grid" id="insumosGrid">
        <div style="color:var(--text-dim);padding:40px;text-align:center">Cargando…</div>
      </div>
    </div>
  </div>

  <!-- ── TAB 4: KPIs ── -->
  <div class="tab-panel" id="panel-kpis">
    <div class="panel-header">
      <div class="panel-title">KPIs de planta</div>
      <div style="font-size:12px;color:var(--text-dim)" id="kpiDate"></div>
    </div>
    <div class="kpis-wrap" id="kpisWrap">
      <div style="color:var(--text-dim);text-align:center;padding:40px">Cargando…</div>
    </div>
  </div>

</div>

<script>
const DATA_ALL   = 'https://csotoajoy.github.io/grupoerlo/ps_all.json';
const REFRESH_MS = 30000;

// ── MAPA DE CATEGORÍAS ───────────────────────────────────────────────────────
const CATEGORIAS = {
  'Roll On 75ml Tradicional': ['10-03','10-11','10-08','10-09','10-12','10-18','10-06','10-07','10-14','10-10','10-19','10-72','10-70','10-02','10-16','10-01'],
  'Roll On 75ml Fino':        ['10-04','10-74','10-90','10-75','10-76','10-77','10-78','10-80','10-79','10-81','10-82','10-83','10-84','10-85','10-86','10-87','10-88','10-89','10-91','10-92','10-93','10-94','10-95','10-96'],
  'Roll On 50ml':             ['10-21','10-30','10-26','10-32','10-28','10-22','10-23','10-24','10-25','10-33','10-31','10-27','10-73','10-71','10-29','10-34','10-35','10-20'],
  'Bodies':                   ['80-00','80-01','80-02','80-03','80-04','80-05','80-06','80-07','80-08','80-10','80-09','80-11','80-12','80-14','80-13','80-15','80-16','80-17','80-18','80-19','80-20','80-21','80-22'],
  'Perfumes Glamour':         ['40-12','40-11','40-14','40-16','40-19','40-18','40-15','40-10','40-13','40-17','40-09','40-20','40-21','40-23','40-22','40-26','40-25','40-24'],
  'Perfumes':                 ['40-02','40-03','40-08','40-00'],
  'Cremas Algamarinas':       ['30-02','30-03','30-00','30-01','30-17'],
  'Cremas Aromas':            ['30-12','30-11','30-14','30-10','30-13','30-09'],
  'Talco 375gr':              ['50-18','50-02','50-06','50-17','50-19','50-21','50-23','50-03','50-04','50-05'],
  'Talco 150gr':              ['50-07','50-29','50-13','50-12','50-26','50-24','50-25','50-14','50-15','50-20','50-22','50-11','50-10'],
  'Talco Baby 575gr':         ['50-01'],
  'Talco Rosas':              ['50-09'],
  'Gel':                      ['20-00','20-01','70-00'],
  'Shampoo Baby':             ['60-00','60-01'],
  'Shampoo Frachel':          ['60-02','60-06','60-09','60-04','60-05','60-08','60-10','60-07'],
  'Ofertas/Tripack':          ['30-22','30-19','30-23','30-21','30-20','30-18','10-55','10-59','10-56','10-53','10-58','10-57','10-61','10-60','10-54','10-52'],
};

// Índice inverso: código → categoría
const COD_A_CAT = {};
Object.entries(CATEGORIAS).forEach(([cat, codigos]) => {
  codigos.forEach(c => { COD_A_CAT[c] = cat; });
});

let dispCatActual = 'TODAS';
let dispDetalleAbierto = null;

const PRIORIDAD_COLOR = {
  'URGENTE':   '#e74c3c',
  'A':         '#e67e22',
  'B':         '#3498db',
  'C':         '#2ecc71',
  'BLOQUEADA': '#9b59b6',
};

const ESTADO_CFG = {
  'En Producción': { color:'#2ecc71', bg:'rgba(46,204,113,.15)', border:'rgba(46,204,113,.3)' },
  'Pausada':       { color:'#f39c12', bg:'rgba(243,156,18,.15)', border:'rgba(243,156,18,.3)' },
  'Bloqueada':     { color:'#e74c3c', bg:'rgba(231,76,60,.15)',  border:'rgba(231,76,60,.3)'  },
  'Pendiente':     { color:'#4a5a78', bg:'rgba(74,90,120,.12)',  border:'rgba(74,90,120,.2)'  },
  'Completada':    { color:'#2ecc71', bg:'rgba(46,204,113,.12)', border:'rgba(46,204,113,.2)' },
};

const MAQUINAS_GANTT = [
  'Sopladora',
  'Inyectora 1',
  'Inyectora 2',
  'Inyección soplado (Ametralladora)',
  'Maquina de Bolitas',
  'Llenadora Roll On Grande',
  'Llenadora Roll On Pequeño',
  'Llenadora de Crema',
  'Llenadora de Talco',
  'Llenadora de Gel',
];

let allData = null;
let filtroInsumos = 'all';
let activeTab = 'gantt';
let dispCatActualSel = 'TODAS';
let dispDetalleActual = null;

// ── RELOJ ──
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}

// ── TABS ──
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    const tabs = ['gantt','disp','insumos','kpis'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(p => {
    p.classList.toggle('active', p.id === 'panel-' + tab);
  });
}

// ── FETCH ──
async function fetchAll() {
  try {
    const r = await fetch(DATA_ALL + '?t=' + Date.now());
    allData = await r.json();
    document.getElementById('statusDot').style.background = '#2ecc71';
    renderAll();
  } catch(e) {
    document.getElementById('statusDot').style.background = '#e74c3c';
  }
}

function renderAll() {
  renderGantt();
  renderDisp();
  renderInsumos();
  renderKPIs();
}

// ─────────────────────────────────────────
// MÓDULO 1 — GANTT
// ─────────────────────────────────────────
function renderGantt() {
  if (!allData) return;
  const ops = allData.ordenes || [];
  const wrap = document.getElementById('ganttWrap');

  if (allData.actualizado) {
    const d = new Date(allData.actualizado);
    document.getElementById('ganttUpdated').textContent =
      'Actualizado: ' + d.toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit'});
  }

  let html = '';

  MAQUINAS_GANTT.forEach(maq => {
    const maqOps = ops.filter(o => o.maquina === maq && o.estado !== 'Completada');
    if (maqOps.length === 0) return;

    html += `<div class="gantt-machine">
      <div class="gantt-machine-header">
        <div class="machine-name">${maq}</div>
        <div class="machine-ops-count">${maqOps.length} OP${maqOps.length>1?'s':''}</div>
      </div>
      <div class="gantt-ops">`;

    // Alerta tiempo muerto entre OPs
    for (let i = 0; i < maqOps.length - 1; i++) {
      const op = maqOps[i];
      const next = maqOps[i+1];
      if (op.fecha_fin && next.fecha_inicio) {
        const fin  = new Date(op.fecha_fin);
        const ini  = new Date(next.fecha_inicio);
        const diff = (ini - fin) / 60000; // minutos
        if (diff > 60) {
          html += `<div class="idle-alert">⚠ Tiempo muerto: ${Math.round(diff/60)}h entre "${op.sku}" y "${next.sku}"</div>`;
        }
      }
    }

    maqOps.forEach(op => {
      const pcolor = PRIORIDAD_COLOR[op.prioridad] || '#3498db';
      const ecfg   = ESTADO_CFG[op.estado] || ESTADO_CFG['Pendiente'];
      const inicio = op.fecha_inicio ? fmtDatetime(op.fecha_inicio) : '—';
      const fin    = op.fecha_fin    ? fmtDatetime(op.fecha_fin)    : '—';

      html += `<div class="gantt-op-row" style="border-left-color:${pcolor}">
        <div>
          <div class="op-sku-gantt">${op.sku || '—'}</div>
          ${op.molde ? `<div style="font-size:11px;color:var(--text-dim);margin-top:2px">Molde: ${op.molde}</div>` : ''}
        </div>
        <div class="op-cell">
          <span class="op-cell-label">Inicio</span>${inicio}
        </div>
        <div class="op-cell">
          <span class="op-cell-label">Fin</span>${fin}
        </div>
        <div>
          <span class="op-cell-label">Estado</span>
          <span class="pill-sm" style="background:${ecfg.bg};color:${ecfg.color};border:1px solid ${ecfg.border}">${op.estado||'Pendiente'}</span>
        </div>
        <div>
          <span class="op-cell-label">Prioridad</span>
          <span class="pill-sm" style="background:${pcolor}18;color:${pcolor};border:1px solid ${pcolor}40">${op.prioridad}</span>
        </div>
        <div class="op-cell" style="text-align:right">
          <span class="op-cell-label">Cantidad</span>
          <strong>${formatNum(op.cantidad)}</strong>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  // Estaciones sin máquina definida (maquina vacío)
  const sinMaquina = ops.filter(o =>
    !o.maquina &&
    ['B-Inyección Soplado','B-Maquina Bolitas','D-Llenado'].includes(o.estacion) &&
    o.estado !== 'Completada'
  );

  if (sinMaquina.length > 0) {
    html += `<div class="gantt-machine">
      <div class="gantt-machine-header">
        <div class="machine-name" style="color:var(--text-dim)">Sin máquina asignada</div>
        <div class="machine-ops-count">${sinMaquina.length} OPs</div>
      </div>
      <div class="gantt-ops">`;
    sinMaquina.forEach(op => {
      const pcolor = PRIORIDAD_COLOR[op.prioridad] || '#3498db';
      html += `<div class="gantt-op-row" style="border-left-color:${pcolor};opacity:.7">
        <div class="op-sku-gantt">${op.sku}</div>
        <div class="op-cell"><span class="op-cell-label">Estación</span>${op.estacion}</div>
        <div></div>
        <div></div>
        <div>
          <span class="pill-sm" style="background:${pcolor}18;color:${pcolor};border:1px solid ${pcolor}40">${op.prioridad}</span>
        </div>
        <div class="op-cell" style="text-align:right"><strong>${formatNum(op.cantidad)}</strong></div>
      </div>`;
    });
    html += `</div></div>`;
  }

  if (!html) html = '<div class="gantt-empty">No hay órdenes de producción activas en planta.</div>';
  wrap.innerHTML = html;
}

// ─────────────────────────────────────────
// MÓDULO 2 — DISPONIBILIDAD POR CATEGORÍAS
// ─────────────────────────────────────────
function setDispCat(cat, btn) {
  dispCatActualSel = cat;
  dispDetalleActual = null;
  document.querySelectorAll('.disp-cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDisp();
}

function toggleDispDetalle(cat) {
  dispDetalleActual = dispDetalleActual === cat ? null : cat;
  renderDisp();
}

function renderDisp() {
  if (!allData) return;
  const pt  = allData.inventario_pt  || [];
  const ocs = allData.ordenes_compra || [];

  // Índice stock PT por código
  const stockIdx = {};
  pt.forEach(p => { stockIdx[p.codigo] = Math.max(0, parseFloat(p.unds) || 0); });

  // Demanda pendiente por código desde OCs (status != Entregado/Cancelado)
  const demandaIdx = {};
  ocs.forEach(oc => {
    const st = (oc.Status || oc.status || '').toLowerCase();
    if (st === 'entregado' || st === 'cancelado') return;
    const cod  = oc.Code || oc.codigo || '';
    const pend = parseFloat(oc['Cantidad Pendiente'] || oc['Total Unds'] || oc.cantidad || 0);
    if (cod) demandaIdx[cod] = (demandaIdx[cod] || 0) + pend;
  });

  // Construir datos por categoría
  const dataCats = {};
  Object.entries(CATEGORIAS).forEach(([cat, codigos]) => {
    const items = codigos.map(cod => {
      const stock   = stockIdx[cod] || 0;
      const demanda = demandaIdx[cod] || 0;
      const ptItem  = pt.find(p => p.codigo === cod);
      const nombre  = ptItem ? ptItem.descripcion : cod;
      const cobertura = demanda > 0 ? Math.min(100, Math.round((stock/demanda)*100)) : (stock > 0 ? 100 : 0);
      return { cod, nombre, stock, demanda, cobertura, diff: stock - demanda };
    });

    const conDemanda = items.filter(i => i.demanda > 0 || i.stock > 0);
    const nTotal  = conDemanda.length || codigos.length;
    const nOk     = items.filter(i => i.cobertura >= 100).length;
    const nWarn   = items.filter(i => i.cobertura >= 50 && i.cobertura < 100).length;
    const nRed    = items.filter(i => i.cobertura < 50).length;
    const pctCat  = nTotal > 0 ? Math.round((nOk / nTotal) * 100) : 0;

    dataCats[cat] = { items, nTotal, nOk, nWarn, nRed, pctCat,
      color: pctCat >= 80 ? '#2ecc71' : pctCat >= 50 ? '#f39c12' : '#e74c3c' };
  });

  // Construir botones de filtro si no existen
  const filtrosEl = document.getElementById('dispFiltros');
  if (filtrosEl.children.length <= 1) {
    Object.keys(CATEGORIAS).forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'disp-cat-btn';
      btn.textContent = cat;
      btn.onclick = () => setDispCat(cat, btn);
      filtrosEl.appendChild(btn);
    });
  }

  const wrap = document.getElementById('dispWrap');

  // Filtrar categorías a mostrar
  const catsAMostrar = dispCatActualSel === 'TODAS'
    ? Object.keys(CATEGORIAS)
    : [dispCatActualSel];

  let html = '';

  if (dispCatActualSel === 'TODAS') {
    // Vista grid de summaries
    html += '<div class="disp-cat-grid">';
    catsAMostrar.forEach(cat => {
      const d = dataCats[cat];
      const expandida = dispDetalleActual === cat;
      const dotsHtml = d.items.slice(0,20).map(i => {
        const c = i.cobertura >= 100 ? '#2ecc71' : i.cobertura >= 50 ? '#f39c12' : '#e74c3c';
        return `<div class="dcc-dot" title="${i.nombre}: ${i.cobertura}%" style="background:${c}"></div>`;
      }).join('');

      html += `<div class="disp-cat-card ${expandida?'expandida':''}" onclick="toggleDispDetalle('${cat}')">
        <div class="dcc-header">
          <div class="dcc-nombre">${cat}</div>
          <div class="dcc-pct" style="color:${d.color}">${d.pctCat}%</div>
        </div>
        <div class="dcc-sub">
          <span style="color:#2ecc71">✓ ${d.nOk}</span>
          <span style="color:#f39c12">~ ${d.nWarn}</span>
          <span style="color:#e74c3c">✗ ${d.nRed}</span>
          <span>${d.nTotal} SKUs</span>
        </div>
        <div class="dcc-track"><div class="dcc-fill" style="width:${d.pctCat}%;background:${d.color}"></div></div>
        <div class="dcc-dots">${dotsHtml}</div>
      </div>`;
    });
    html += '</div>';

    // Detalle expandido debajo del grid si hay uno seleccionado
    if (dispDetalleActual && dataCats[dispDetalleActual]) {
      html += renderDispDetalle(dispDetalleActual, dataCats[dispDetalleActual]);
    }
  } else {
    // Vista detalle de una sola categoría
    html += renderDispDetalle(dispCatActualSel, dataCats[dispCatActualSel]);
  }

  wrap.innerHTML = html;
}

function renderDispDetalle(cat, d) {
  const itemsOrdenados = [...d.items].sort((a,b) => a.cobertura - b.cobertura);
  const rows = itemsOrdenados.map(i => {
    const c = i.cobertura >= 100 ? '#2ecc71' : i.cobertura >= 50 ? '#f39c12' : '#e74c3c';
    return `<div class="disp-detalle-row">
      <div>
        <div class="ddr-nombre">${i.nombre}</div>
        <div class="ddr-cod">${i.cod}</div>
      </div>
      <div class="ddr-num" style="color:${i.stock>0?'var(--text)':'#e74c3c'}">${formatNum(i.stock)}</div>
      <div class="ddr-num">${formatNum(i.demanda)}</div>
      <div class="ddr-num" style="color:${i.diff>=0?'#2ecc71':'#e74c3c'}">${i.diff>=0?'+':''}${formatNum(i.diff)}</div>
      <div class="ddr-bar">
        <div class="ddr-bar-track"><div class="ddr-bar-fill" style="width:${i.cobertura}%;background:${c}"></div></div>
        <div class="ddr-bar-pct" style="color:${c}">${i.cobertura}%</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="disp-detalle" style="margin-top:10px">
    <div class="disp-detalle-header">
      <div>${cat}</div>
      <div style="text-align:right">Stock PT</div>
      <div style="text-align:right">OC pendiente</div>
      <div style="text-align:right">Diferencia</div>
      <div>Cobertura</div>
    </div>
    ${rows}
  </div>`;
}

// ─────────────────────────────────────────
// MÓDULO 3 — INSUMOS
// ─────────────────────────────────────────
function setFilter(f, btn) {
  filtroInsumos = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderInsumos();
}

function renderInsumos() {
  if (!allData) return;
  const insumos = allData.insumos || [];
  const grid = document.getElementById('insumosGrid');

  const items = insumos.map(s => {
    const unds   = parseFloat(s.Cantidad) || 0;
    const minimo = parseFloat(s.cantidadMinima || 0);
    // Extraer producto si viene como objeto
    let producto = s['Producto al que aplica'];
    if (typeof producto === 'object' && producto !== null) {
      producto = producto.Value || producto.Title || '—';
    }
    let nivel;
    if (unds <= 0)            nivel = 'red';
    else if (unds <= minimo)  nivel = 'amber';
    else                      nivel = 'green';
    return { ...s, unds, minimo, nivel, producto };
  }).filter(s => filtroInsumos === 'all' || s.nivel === filtroInsumos)
    .sort((a,b) => {
      const order = { red:0, amber:1, green:2 };
      return order[a.nivel] - order[b.nivel];
    });

  if (items.length === 0) {
    grid.innerHTML = '<div style="color:var(--text-dim);padding:40px;text-align:center">Sin insumos en esta categoría.</div>';
    return;
  }

  const colores = { red: '#e74c3c', amber: '#f39c12', green: '#2ecc71' };

  grid.innerHTML = items.map(s => {
    const color = colores[s.nivel];
    return `<div class="insumo-card" style="border-left-color:${color}">
      <div class="insumo-tipo">${s.Subcategoría || s.subcategoria || '—'}</div>
      <div class="insumo-name">${s.Titulo || s.insumo || '—'}</div>
      <div class="insumo-stock" style="color:${color}">${formatNum(s.unds)} <span style="font-size:11px;color:${color}88">${s.UOM||s.uom||''}</span></div>
      <div class="insumo-minimo">Mínimo: ${formatNum(s.minimo)} · ${s.producto || ''}</div>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────
// MÓDULO 4 — KPIs
// ─────────────────────────────────────────
function renderKPIs() {
  if (!allData) return;
  const ops = allData.ordenes || [];
  const ocs = allData.ordenes_compra || [];
  const wrap = document.getElementById('kpisWrap');
  document.getElementById('kpiDate').textContent = new Date().toLocaleDateString('es-CR',{weekday:'long',day:'numeric',month:'long'});

  // KPIs de producción
  const activas     = ops.filter(o => o.estado === 'En Producción').length;
  const completadas = ops.filter(o => o.estado === 'Completada').length;
  const bloqueadas  = ops.filter(o => o.prioridad === 'BLOQUEADA').length;
  const total       = ops.length;
  const eficiencia  = total > 0 ? Math.round((completadas / total) * 100) : 0;

  // KPIs de OCs
  const hoy = new Date().toISOString().substring(0,10);
  const ocsActivas    = ocs.filter(o => !['entregado','cancelado'].includes((o.Status||'').toLowerCase()));
  const ocsVencidas   = ocsActivas.filter(o => (o['Fecha de Entrega']||'') < hoy);
  const ocsParciales  = ocsActivas.filter(o => (o.Status||'').toLowerCase() === 'parcial');
  const totalUnidsPend = ocsActivas.reduce((s,o) => s + (parseFloat(o['Cantidad Pendiente']||o['Total Unds']||0)), 0);

  // SKUs más atrasados
  const skuAtraso = {};
  ocsVencidas.forEach(o => {
    const prod = o.Producto || o.producto || '';
    if (!skuAtraso[prod]) skuAtraso[prod] = { unds: 0, nOCs: 0 };
    skuAtraso[prod].unds  += parseFloat(o['Cantidad Pendiente']||o['Total Unds']||0);
    skuAtraso[prod].nOCs  += 1;
  });
  const topAtrasados = Object.entries(skuAtraso)
    .sort((a,b) => b[1].unds - a[1].unds).slice(0,8);

  // Por estación
  const estMap = {};
  ops.forEach(op => {
    if (!op.estacion) return;
    if (!estMap[op.estacion]) estMap[op.estacion] = { total:0, completadas:0, activas:0 };
    estMap[op.estacion].total++;
    if (op.estado === 'En Producción') estMap[op.estacion].activas++;
    if (op.estado === 'Completada')    estMap[op.estacion].completadas++;
  });

  wrap.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-card-label">Estaciones activas</div>
        <div class="kpi-card-val" style="color:#2ecc71">${activas}</div>
        <div class="kpi-card-sub">de ${Object.keys(estMap).length} con OPs</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card-label">OPs completadas</div>
        <div class="kpi-card-val" style="color:#3498db">${completadas}</div>
        <div class="kpi-card-sub">de ${total} órdenes totales</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card-label">OCs vencidas</div>
        <div class="kpi-card-val" style="color:${ocsVencidas.length>0?'#e74c3c':'#2ecc71'}">${ocsVencidas.length}</div>
        <div class="kpi-card-sub">de ${ocsActivas.length} OCs activas</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card-label">Unidades pendientes</div>
        <div class="kpi-card-val" style="color:#f39c12">${formatNum(Math.round(totalUnidsPend))}</div>
        <div class="kpi-card-sub">${ocsParciales.length} líneas parciales</div>
      </div>
    </div>

    ${topAtrasados.length > 0 ? `
    <div>
      <div class="por-estacion-title">SKUs con mayor atraso en OCs</div>
      ${topAtrasados.map(([prod, d]) => {
        const pct = Math.min(100, Math.round((d.unds / (topAtrasados[0][1].unds||1)) * 100));
        return `<div class="est-kpi-row">
          <div class="est-kpi-name" style="font-size:12px">${prod}</div>
          <div><div class="est-kpi-bar-track"><div class="est-kpi-bar-fill" style="width:${pct}%;background:#e74c3c"></div></div></div>
          <div class="est-kpi-num" style="color:#e74c3c">${formatNum(Math.round(d.unds))}</div>
          <div class="est-kpi-num">${d.nOCs} OC${d.nOCs>1?'s':''}</div>
          <div></div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <div>
      <div class="por-estacion-title">Estado por estación</div>
      ${Object.entries(estMap).sort((a,b) => b[1].activas - a[1].activas).map(([est, d]) => {
        const ef = d.total > 0 ? Math.round((d.completadas / d.total) * 100) : 0;
        return `<div class="est-kpi-row">
          <div class="est-kpi-name">${est}</div>
          <div><div class="est-kpi-bar-track"><div class="est-kpi-bar-fill" style="width:${ef}%"></div></div></div>
          <div class="est-kpi-num" style="color:${d.activas>0?'#2ecc71':'#4a5a78'}">${d.activas>0?'🟢':'⚫'} ${d.activas}</div>
          <div class="est-kpi-num">${d.total} OPs</div>
          <div class="est-kpi-num" style="color:${ef>=70?'#2ecc71':ef>=40?'#f39c12':'#e74c3c'}">${ef}%</div>
        </div>`;
      }).join('')}
    </div>`;
}



// ── UTILS ──
function formatNum(n) {
  if (!n && n !== 0) return '—';
  return Number(n).toLocaleString('es-CR');
}

function fmtDatetime(str) {
  if (!str) return '—';
  const d = new Date(str);
  if (isNaN(d)) return str;
  return d.toLocaleDateString('es-CR',{day:'2-digit',month:'2-digit'}) + ' ' +
         d.toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit'});
}

// ── BOOT ──
updateClock();
setInterval(updateClock, 1000);
fetchAll();
setInterval(fetchAll, REFRESH_MS);
</script>
