<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supervisor — Grupo Erlo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070b11;
    --surface: #0e1520;
    --surface2: #131d2c;
    --surface3: #182030;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #eef2ff;
    --text-dim: #4a5a78;
    --text-mid: #8090b0;
    --green: #2ecc71;
    --amber: #f39c12;
    --red: #e74c3c;
    --blue: #3498db;
    --purple: #9b59b6;
    --accent: #0080ff;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    gap: 16px;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .logo-box {
    width: 56px; height: 56px;
    background: white;
    border: 1px solid rgba(0,128,255,0.2);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    padding: 4px;
    overflow: hidden;
  }

  .company { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; color:var(--text-mid); text-transform:uppercase; letter-spacing:.05em; }
  .page-sub { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.1em; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }

  .tab-btn {
    background: none;
    border: none;
    border-radius: 6px;
    padding: 7px 16px;
    color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: .05em;
    transition: all .2s;
    white-space: nowrap;
  }

  .tab-btn:hover { color: var(--text-mid); background: var(--surface3); }
  .tab-btn.active { background: var(--accent); color: #fff; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .clock {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 28px; line-height:1;
  }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    animation: blink 2s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 6px 12px;
    color: var(--text-mid);
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
  }

  .refresh-btn:hover { border-color: var(--accent); color: #4af; }

  /* ── CONTENT ── */
  .content {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .tab-panel {
    display: none;
    flex: 1;
    min-height: 0;
    flex-direction: column;
    overflow: hidden;
  }

  .tab-panel.active { display: flex; }

  /* Panel disp — scroll habilitado */
  #panel-disp {
    overflow-y: auto !important;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
  }
  #panel-disp .panel-header {
    flex-shrink: 0;
  }
  #panel-disp .disp-wrap {
    overflow: visible !important;
    flex: unset !important;
    padding-bottom: 40px;
  }

  /* ── PANEL HEADER ── */
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }

  .panel-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 16px;
    color: var(--text-mid); text-transform: uppercase; letter-spacing:.05em;
  }

  /* ─────────────────────────────────────────
     MÓDULO 1 — GANTT
  ───────────────────────────────────────── */
  .gantt-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .gantt-machine {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    border-left-width: 3px;
  }

  .gantt-machine-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    gap: 12px;
  }

  .gantt-machine-header:hover {
    background: rgba(255,255,255,.03);
  }

  .machine-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 15px;
    color: var(--text); text-transform: uppercase; letter-spacing:.05em;
  }

  .machine-ops-count {
    font-size: 12px; color: var(--text-dim);
  }

  .gantt-ops {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .gantt-empty {
    color: var(--text-dim);
    text-align: center;
    padding: 60px 20px;
    font-size: 14px;
  }

  .idle-alert {
    font-size: 11px;
    color: #f39c12;
    padding: 4px 12px;
    background: rgba(243,156,18,.08);
    border-radius: 4px;
    margin-bottom: 4px;
  }

  .gantt-op-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    border-left: 3px solid;
    transition: border-color .2s;
  }

  .gantt-op-row:hover { background: rgba(255,255,255,.03); }

  .op-sku-gantt {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 15px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .op-cell {
    font-size: 12px; color: var(--text-mid);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .op-cell-label {
    font-size: 10px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing:.08em;
    display: block; margin-bottom: 2px;
  }

  .pill-sm {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 11px;
    padding: 3px 8px; border-radius: 4px;
    text-transform: uppercase; letter-spacing:.05em;
    display: inline-block;
  }

  .gantt-empty {
    padding: 16px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* alerta tiempo muerto */
  .idle-alert {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: rgba(231,76,60,0.1);
    border: 1px solid rgba(231,76,60,0.2);
    border-radius: 6px;
    font-size: 12px;
    color: #ff6b6b;
    margin: 0 12px 8px;
  }

  /* ─────────────────────────────────────────
     MÓDULO 2 — DISPONIBILIDAD
  ───────────────────────────────────────── */
  .disp-wrap {
    flex: unset;
    overflow: visible;
    padding: 16px 24px;
  }

  .disp-table {
    width: 100%;
    border-collapse: collapse;
  }

  .disp-table th {
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing:.1em;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
  }

  .disp-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: middle;
  }

  .disp-table tr:hover td { background: var(--surface2); }

  .semaforo {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    flex-shrink: 0;
  }

  .sku-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 14px;
  }

  .num-cell {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 15px;
    text-align: right;
  }

  .bar-cell { width: 160px; }

  .mini-bar-track {
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    overflow: hidden;
  }

  .mini-bar-fill {
    height: 100%;
    border-radius: 100px;
  }

  /* ─────────────────────────────────────────
     MÓDULO 3 — INSUMOS
  ───────────────────────────────────────── */
  .insumos-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .insumos-filter {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 14px;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .filter-btn.active, .filter-btn:hover {
    background: var(--surface3);
    color: var(--text);
    border-color: var(--border2);
  }

  .filter-btn.f-red.active { border-color: rgba(231,76,60,.5); color: var(--red); }
  .filter-btn.f-amber.active { border-color: rgba(243,156,18,.5); color: var(--amber); }
  .filter-btn.f-green.active { border-color: rgba(46,204,113,.5); color: var(--green); }

  .insumos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
    overflow-y: auto;
    flex: 1;
  }

  .insumo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    border-left: 3px solid;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .insumo-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 14px;
    line-height: 1.2;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .insumo-tipo {
    font-size: 10px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing:.08em;
  }

  .insumo-stock {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 22px;
    line-height: 1; margin-top: 4px;
  }

  .insumo-minimo {
    font-size: 11px; color: var(--text-dim);
  }

  /* ─────────────────────────────────────────
     MÓDULO 4 — KPIs
  ───────────────────────────────────────── */
  .kpis-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .kpi-card-label {
    font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing:.1em;
  }

  .kpi-card-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 44px; line-height:1;
  }

  .kpi-card-sub {
    font-size: 12px; color: var(--text-dim);
  }

  .por-estacion-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 14px;
    color: var(--text-mid); text-transform: uppercase; letter-spacing:.05em;
    margin-bottom: 8px;
  }

  .est-kpi-row {
    display: grid;
    grid-template-columns: 200px 1fr 80px 80px 100px;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
  }

  .est-kpi-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 14px;
  }

  .est-kpi-bar-track {
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    overflow: hidden;
  }

  .est-kpi-bar-fill {
    height: 100%;
    border-radius: 100px;
    background: var(--accent);
    transition: width .8s ease;
  }

  .est-kpi-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 15px;
    text-align: right;
  }

  /* ── DISPONIBILIDAD CON CATEGORÍAS ── */
  .disp-filtros {
    display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
  }
  .disp-cat-btn {
    padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border2); background: transparent;
    color: var(--text-dim); cursor: pointer; transition: .15s;
    font-family: 'Barlow', sans-serif; text-transform: uppercase; letter-spacing: .04em;
  }
  .disp-cat-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .disp-cat-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  .disp-wrap { flex: unset; overflow: visible; padding: 16px 24px; display: flex; flex-direction: column; gap: 10px; }

  /* Summary cards de categoría */
  .disp-cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }

  .disp-cat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: .15s;
  }
  .disp-cat-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .disp-cat-card.expandida { border-color: var(--accent); }

  .dcc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .dcc-nombre { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; }
  .dcc-pct { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 20px; }
  .dcc-sub { display: flex; gap: 10px; font-size: 10px; color: var(--text-dim); margin-bottom: 6px; }
  .dcc-track { height: 5px; background: rgba(255,255,255,.06); border-radius: 100px; overflow: hidden; }
  .dcc-fill  { height: 100%; border-radius: 100px; transition: width .4s; }
  .dcc-dots  { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .dcc-dot   { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* Detalle expandido de una categoría */
  .disp-detalle {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
  }
  .disp-detalle-header {
    display: grid;
    grid-template-columns: 1fr 90px 90px 90px 100px;
    padding: 7px 14px; background: var(--surface3);
    border-bottom: 1px solid var(--border);
    font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .06em;
    gap: 8px;
  }
  .disp-detalle-row {
    display: grid;
    grid-template-columns: 1fr 90px 90px 90px 100px;
    padding: 8px 14px; border-bottom: 1px solid var(--border);
    align-items: center; gap: 8px; transition: .1s;
  }
  .disp-detalle-row:last-child { border-bottom: none; }
  .disp-detalle-row:hover { background: rgba(255,255,255,.02); }
  .ddr-nombre { font-size: 12px; line-height: 1.3; }
  .ddr-cod { font-size: 10px; color: var(--text-dim); }
  .ddr-num { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; text-align: right; }
  .ddr-bar { display: flex; align-items: center; gap: 6px; }
  .ddr-bar-track { flex: 1; height: 4px; background: rgba(255,255,255,.06); border-radius: 100px; overflow: hidden; }
  .ddr-bar-fill  { height: 100%; border-radius: 100px; }
  .ddr-bar-pct   { font-size: 10px; font-weight: 700; min-width: 30px; text-align: right; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>

// Helpers robustos — aceptan campos de SP (mayúsculas) o JSON local
const _sku  = o => o.producto_sku||o.sku||o['Producto/SKU']||o.ProductoSKU||o.Titulo||o.titulo||o.Title||'—';
const _est  = o => o.estacion||o['Estación']||o.Estacion||o.Estacion||'';
const _prio = o => o.prioridad||o.Prioridad||'C';
const _est2 = o => o.estado||o.Estado||'Pendiente';
const _opc  = o => o.op_code||o.opCode||o['OP Code']||o.OpCode||'';
const _cant = o => parseFloat(o.cantidad||o.Cantidad||0);
const _uom  = o => o.unidad_produccion||o['Unidad de medida']||o.UnidadProduccion||'Unidades';
const _maq  = o => o.maquina||o.Maquina||o['Máquina']||'';
const _mol  = o => o.molde||o.Molde||'';
const _mb   = o => o.master_batch||o['Master Batch']||o.masterBatch||'';
const _safeId = s => String(s).replace(/[^a-z0-9]/gi,'_').substring(0,40);

function renderGantt() {
  if (!allData) return;
  const ops = allData.ordenes || [];
  const wrap = document.getElementById('ganttWrap');

  if (allData.actualizado) {
    const d = new Date(allData.actualizado);
    document.getElementById('ganttUpdated').textContent =
      'Actualizado: ' + d.toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit'});
  }

  const activas = ops.filter(o => {
    const e = _est2(o).toLowerCase();
    return e !== 'completada' && e !== 'completed';
  });

  if (activas.length === 0) {
    wrap.innerHTML = '<div class="gantt-empty">No hay órdenes de producción activas en planta.</div>';
    return;
  }

  // Agrupar por cadena usando el op_code o el nombre del PT
  const cadenas = {};
  activas.forEach(op => {
    const opCode = _opc(op);
    const partes = opCode.split('-');
    let clave = '';

    // Extraer clave del op_code: APRE-10-01-210426 → "10-01"
    if (partes.length >= 3) {
      const sinFecha = partes.slice(0, -1);
      clave = sinFecha.slice(1).join('-');
    }
    // Si clave es solo una fecha o vacía, usar el SKU
    if (!clave || /^\d{6}$/.test(clave)) {
      const est = _est(op);
      if (['D-Llenado','E-Alisto','C-Etiquetado y Serigrafía'].includes(est)) {
        clave = _sku(op).substring(0,30);
      } else {
        clave = (_est(op)+'-'+_sku(op)).substring(0,30);
      }
    }
    clave = clave.trim() || 'SIN-CADENA';
    if (!cadenas[clave]) cadenas[clave] = [];
    cadenas[clave].push(op);
  });

  const ORDEN_EST = {
    'A-Cambio de Molde':0,'A-Preparar Resina':1,'A-Quimico':2,
    'B-Inyección Soplado':3,'B-Maquina Bolitas':4,
    'C-Armar Tapas':5,'C-Etiquetado y Serigrafía':6,
    'D-Llenado':7,'E-Alisto':8,
  };
  const pOrd = {'URGENTE':0,'A':1,'B':2,'C':3,'BLOQUEADA':4};

  const pCadena = opsArr => {
    if (opsArr.some(o => _est2(o).toLowerCase().includes('producc'))) return 0;
    const min = Math.min(...opsArr.map(o => pOrd[_prio(o)]??4));
    return min + 1;
  };

  const cadenasOrdenadas = Object.entries(cadenas)
    .sort((a,b) => pCadena(a[1]) - pCadena(b[1]));

  let html = '';

  cadenasOrdenadas.forEach(([clave, opsC]) => {
    opsC.sort((a,b) => (ORDEN_EST[_est(a)]??9) - (ORDEN_EST[_est(b)]??9));

    const opPT = opsC.find(o => ['D-Llenado','E-Alisto','C-Etiquetado y Serigrafía'].includes(_est(o)));
    const nombreCadena = opPT ? _sku(opPT) : _sku(opsC[0]);
    if (!nombreCadena || nombreCadena === '—') return; // saltar cadenas vacías

    const tieneActiva    = opsC.some(o => _est2(o).toLowerCase().includes('producc'));
    const tieneBloqueada = opsC.some(o => _prio(o)==='BLOQUEADA' || _est2(o).toLowerCase()==='bloqueada');
    const prioridadTop   = opsC.reduce((p,o) => (pOrd[_prio(o)]??9)<(pOrd[p]??9)?_prio(o):p, _prio(opsC[0]));
    const pcolor = PRIORIDAD_COLOR[prioridadTop] || '#3498db';

    const alertas = [];
    for (let i=0;i<opsC.length-1;i++) {
      const fA=opsC[i].fecha_fin||opsC[i]['Fecha Final']||'';
      const iB=opsC[i+1].fecha_inicio||opsC[i+1]['Fecha de Inicio']||'';
      if(fA&&iB){const diff=(new Date(iB)-new Date(fA))/60000;if(diff>60)alertas.push(`⚠ ${Math.round(diff/60)}h entre ${_est(opsC[i]).split('-')[1]||''} y ${_est(opsC[i+1]).split('-')[1]||''}`);}
    }

    const flujo = [...new Set(opsC.map(o=>{const e=_est(o);return e.split('-')[0]+'-'+(e.split('-')[1]||'').substring(0,3);}))].join(' → ');
    const sid = _safeId(clave);

    html += `
    <div class="gantt-machine" style="border-left:3px solid ${pcolor}">
      <div class="gantt-machine-header" onclick="toggleCadena('${sid}')">
        <div style="flex:1;min-width:0">
          <div class="machine-name" style="color:${tieneActiva?'#2ecc71':pcolor}">${nombreCadena}</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:3px">${opsC.length} etapa${opsC.length>1?'s':''} · ${flujo}</div>
          ${alertas.map(a=>`<div style="font-size:10px;color:#f39c12;margin-top:2px">${a}</div>`).join('')}
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          ${tieneActiva?`<span class="pill-sm" style="background:rgba(46,204,113,.2);color:#2ecc71;border:1px solid rgba(46,204,113,.4)">EN PRODUCCIÓN</span>`:''}
          ${tieneBloqueada?`<span class="pill-sm" style="background:rgba(231,76,60,.2);color:#e74c3c;border:1px solid rgba(231,76,60,.4)">BLOQUEADA</span>`:''}
          <span class="pill-sm" style="background:${pcolor}18;color:${pcolor};border:1px solid ${pcolor}40">${prioridadTop}</span>
          <span id="chev-${sid}" style="font-size:16px;color:var(--text-dim)">▼</span>
        </div>
      </div>
      <div class="gantt-ops" id="cad-${sid}">
        ${opsC.map(op=>{
          const pc=PRIORIDAD_COLOR[_prio(op)]||'#3498db';
          const ec=ESTADO_CFG[_est2(op)]||ESTADO_CFG['Pendiente'];
          const kb=['Kilos','Q-Kilos'].includes(_uom(op));
          const cant=kb?`${formatNum(_cant(op))} kg`:`${formatNum(_cant(op))} uds`;
          const det=[_maq(op)?`🔧 ${_maq(op)}`:'',_mol(op)?`📐 ${_mol(op)}`:'',_mb(op)?`🎨 ${_mb(op)}`:''].filter(Boolean).join(' · ');
          return `<div class="gantt-op-row" style="border-left-color:${pc}">
            <div style="flex:1;min-width:0">
              <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em">${_est(op)}</div>
              <div class="op-sku-gantt" style="font-size:13px">${_sku(op)}</div>
              ${det?`<div style="font-size:10px;color:var(--text-dim);margin-top:2px">${det}</div>`:''}
            </div>
            <div class="op-cell"><span class="op-cell-label">Cantidad</span><strong>${cant}</strong></div>
            <div><span class="pill-sm" style="background:${ec.bg};color:${ec.color};border:1px solid ${ec.border}">${_est2(op)}</span></div>
            <div><span class="pill-sm" style="background:${pc}18;color:${pc};border:1px solid ${pc}40">${_prio(op)}</span></div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  wrap.innerHTML = html || '<div class="gantt-empty">No hay cadenas activas.</div>';
}

function toggleCadena(sid) {
  const el = document.getElementById(`cad-${sid}`);
  const ch = document.getElementById(`chev-${sid}`);
  if (!el) return;
  const oculto = el.style.display === 'none';
  el.style.display = oculto ? '' : 'none';
  if (ch) ch.textContent = oculto ? '▼' : '▶';
}

function setDispCat(cat, btn) {
  dispCatActualSel = cat;
  dispDetalleActual = null;
  document.querySelectorAll('.disp-cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderDisp();
}

function toggleDispDetalle(cat) {
  dispDetalleActual = dispDetalleActual === cat ? null : cat;
  renderDisp();
}

function renderDisp() {
  if (!allData) return;
  const pt  = allData.inventario_pt  || [];
  const ocs = allData.ordenes_compra || [];

  // Índice stock PT por código
  const stockIdx = {};
  pt.forEach(p => { stockIdx[p.codigo] = Math.max(0, parseFloat(p.unds) || 0); });

  // Demanda pendiente por código desde OCs (status != Entregado/Cancelado)
  const demandaIdx = {};
  ocs.forEach(oc => {
    const st = (oc.Status || oc.status || '').toLowerCase();
    if (st === 'entregado' || st === 'cancelado') return;
    const cod  = oc.Code || oc.codigo || '';
    const pend = parseFloat(oc['Cantidad Pendiente'] || oc['Total Unds'] || oc.cantidad || 0);
    if (cod) demandaIdx[cod] = (demandaIdx[cod] || 0) + pend;
  });

  // Construir datos por categoría
  const dataCats = {};
  Object.entries(CATEGORIAS).forEach(([cat, codigos]) => {
    const items = codigos.map(cod => {
      const stock   = stockIdx[cod] || 0;
      const demanda = demandaIdx[cod] || 0;
      const ptItem  = pt.find(p => p.codigo === cod);
      const nombre  = (ptItem && ptItem.descripcion) || NOMBRES_FALLBACK[cod] || cod;
      const cobertura = demanda > 0 ? Math.min(100, Math.round((stock/demanda)*100)) : (stock > 0 ? 100 : 0);
      return { cod, nombre, stock, demanda, cobertura, diff: stock - demanda };
    });

    const conDemanda = items.filter(i => i.demanda > 0 || i.stock > 0);
    const nTotal  = conDemanda.length || codigos.length;
    const nOk     = items.filter(i => i.cobertura >= 100).length;
    const nWarn   = items.filter(i => i.cobertura >= 50 && i.cobertura < 100).length;
    const nRed    = items.filter(i => i.cobertura < 50).length;
    const pctCat  = nTotal > 0 ? Math.round((nOk / nTotal) * 100) : 0;

    dataCats[cat] = { items, nTotal, nOk, nWarn, nRed, pctCat,
      color: pctCat >= 80 ? '#2ecc71' : pctCat >= 50 ? '#f39c12' : '#e74c3c' };
  });

  // Construir botones de filtro si no existen
  const filtrosEl = document.getElementById('dispFiltros');
  if (filtrosEl.children.length <= 1) {
    Object.keys(CATEGORIAS).forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'disp-cat-btn';
      btn.textContent = cat;
      btn.onclick = () => setDispCat(cat, btn);
      filtrosEl.appendChild(btn);
    });
  }

  const wrap = document.getElementById('dispWrap');

  // Filtrar categorías a mostrar
  const catsAMostrar = dispCatActualSel === 'TODAS'
    ? Object.keys(CATEGORIAS)
    : [dispCatActualSel];

  let html = '';

  if (dispCatActualSel === 'TODAS') {
    // Vista grid de summaries
    html += '<div class="disp-cat-grid">';
    catsAMostrar.forEach(cat => {
      const d = dataCats[cat];
      const expandida = dispDetalleActual === cat;
      const dotsHtml = d.items.slice(0,20).map(i => {
        const c = i.cobertura >= 100 ? '#2ecc71' : i.cobertura >= 50 ? '#f39c12' : '#e74c3c';
        return `<div class="dcc-dot" title="${i.nombre}: ${i.cobertura}%" style="background:${c}"></div>`;
      }).join('');

      html += `<div class="disp-cat-card ${expandida?'expandida':''}" onclick="toggleDispDetalle('${cat}')">
        <div class="dcc-header">
          <div class="dcc-nombre">${cat}</div>
          <div class="dcc-pct" style="color:${d.color}">${d.pctCat}%</div>
        </div>
        <div class="dcc-sub">
          <span style="color:#2ecc71">✓ ${d.nOk}</span>
          <span style="color:#f39c12">~ ${d.nWarn}</span>
          <span style="color:#e74c3c">✗ ${d.nRed}</span>
          <span>${d.nTotal} SKUs</span>
        </div>
        <div class="dcc-track"><div class="dcc-fill" style="width:${d.pctCat}%;background:${d.color}"></div></div>
        <div class="dcc-dots">${dotsHtml}</div>
      </div>`;
    });
    html += '</div>';

    // Detalle expandido debajo del grid si hay uno seleccionado
    if (dispDetalleActual && dataCats[dispDetalleActual]) {
      html += renderDispDetalle(dispDetalleActual, dataCats[dispDetalleActual]);
    }
  } else {
    // Vista detalle de una sola categoría
    html += renderDispDetalle(dispCatActualSel, dataCats[dispCatActualSel]);
  }

  wrap.innerHTML = html;
}

function renderDispDetalle(cat, d) {
  const itemsOrdenados = [...d.items].sort((a,b) => a.cobertura - b.cobertura);
  const rows = itemsOrdenados.map(i => {
    const c = i.cobertura >= 100 ? '#2ecc71' : i.cobertura >= 50 ? '#f39c12' : '#e74c3c';
    return `<div class="disp-detalle-row">
      <div>
        <div class="ddr-nombre">${i.nombre}</div>
        <div class="ddr-cod">${i.cod}</div>
      </div>
      <div class="ddr-num" style="color:${i.stock>0?'var(--text)':'#e74c3c'}">${formatNum(i.stock)}</div>
      <div class="ddr-num">${formatNum(i.demanda)}</div>
      <div class="ddr-num" style="color:${i.diff>=0?'#2ecc71':'#e74c3c'}">${i.diff>=0?'+':''}${formatNum(i.diff)}</div>
      <div class="ddr-bar">
        <div class="ddr-bar-track"><div class="ddr-bar-fill" style="width:${i.cobertura}%;background:${c}"></div></div>
        <div class="ddr-bar-pct" style="color:${c}">${i.cobertura}%</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="disp-detalle" style="margin-top:10px">
    <div class="disp-detalle-header">
      <div>${cat}</div>
      <div style="text-align:right">Stock PT</div>
      <div style="text-align:right">OC pendiente</div>
      <div style="text-align:right">Diferencia</div>
      <div>Cobertura</div>
    </div>
    ${rows}
  </div>`;
}

// ─────────────────────────────────────────
// MÓDULO 3 — INSUMOS
// ─────────────────────────────────────────
function setFilter(f, btn) {
  filtroInsumos = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderInsumos();
}

let subcatActual = 'TODAS';

function setSubcat(cat, btn) {
  subcatActual = cat;
  document.querySelectorAll('.subcat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderInsumos();
}

function renderInsumos() {
  if (!allData) return;
  const insumos = allData.insumos || [];
  const grid = document.getElementById('insumosGrid');

  const items = insumos.map(s => {
    const unds   = parseFloat(s.Cantidad) || 0;
    const minimo = parseFloat(s.cantidadMinima || 0);
    let producto = s['Producto al que aplica'];
    if (typeof producto === 'object' && producto !== null) {
      producto = producto.Value || producto.Title || '—';
    }
    const subcat = s.Subcategoría || s.subcategoria || 'Sin categoría';
    let nivel;
    if (unds <= 0)           nivel = 'red';
    else if (unds <= minimo) nivel = 'amber';
    else                     nivel = 'green';
    return { ...s, unds, minimo, nivel, producto, subcat };
  }).filter(s => filtroInsumos === 'all' || s.nivel === filtroInsumos);

  if (items.length === 0) {
    grid.innerHTML = '<div style="color:var(--text-dim);padding:40px;text-align:center">Sin insumos.</div>';
    return;
  }

  // Agrupar por subcategoría
  const grupos = {};
  items.forEach(s => {
    if (!grupos[s.subcat]) grupos[s.subcat] = [];
    grupos[s.subcat].push(s);
  });

  // Construir botones de subcategoría si no existen
  const filtrosEl = document.getElementById('insumosGrid').previousElementSibling;
  const subcats = Object.keys(grupos).sort();

  // Renderizar botones en el panel-header de insumos
  const headerInsumos = document.querySelector('#panel-insumos .panel-header');
  let subcatBar = document.getElementById('subcatBar');
  if (!subcatBar) {
    subcatBar = document.createElement('div');
    subcatBar.id = 'subcatBar';
    subcatBar.style.cssText = 'display:flex;flex-wrap:wrap;gap:5px;margin-top:8px';
    headerInsumos.appendChild(subcatBar);
  }
  subcatBar.innerHTML = `
    <button class="subcat-btn${subcatActual==='TODAS'?' active':''}" onclick="setSubcat('TODAS',this)" style="padding:3px 10px;border-radius:12px;border:1px solid var(--border2);background:${subcatActual==='TODAS'?'var(--accent)':'transparent'};color:${subcatActual==='TODAS'?'#fff':'var(--text-dim)'};font-size:10px;cursor:pointer;font-family:Barlow,sans-serif">Todas</button>
    ${subcats.map(cat => `<button class="subcat-btn${subcatActual===cat?' active':''}" onclick="setSubcat('${cat}',this)" style="padding:3px 10px;border-radius:12px;border:1px solid var(--border2);background:${subcatActual===cat?'var(--accent)':'transparent'};color:${subcatActual===cat?'#fff':'var(--text-dim)'};font-size:10px;cursor:pointer;font-family:Barlow,sans-serif">${cat}</button>`).join('')}`;

  const colores = { red:'#e74c3c', amber:'#f39c12', green:'#2ecc71' };

  const gruposFiltrados = subcatActual === 'TODAS'
    ? grupos
    : { [subcatActual]: grupos[subcatActual] || [] };

  let html = '';
  Object.entries(gruposFiltrados).sort().forEach(([cat, sitems]) => {
    const ordenados = sitems.sort((a,b) => {const o={red:0,amber:1,green:2};return o[a.nivel]-o[b.nivel];});
    html += `<div style="grid-column:1/-1;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;padding:6px 0 2px;border-bottom:1px solid var(--border);margin-bottom:4px">${cat} <span style="color:var(--text-dim);font-weight:400">(${ordenados.length})</span></div>`;
    html += ordenados.map(s => {
      const color = colores[s.nivel];
      return `<div class="insumo-card" style="border-left-color:${color}">
        <div class="insumo-tipo">${s.subcat}</div>
        <div class="insumo-name">${s.Titulo || s.insumo || '—'}</div>
        <div class="insumo-stock" style="color:${color}">${formatNum(s.unds)} <span style="font-size:11px;color:${color}88">${s.UOM||s.uom||''}</span></div>
        <div class="insumo-minimo">Mín: ${formatNum(s.minimo)}</div>
      </div>`;
    }).join('');
  });

  grid.innerHTML = html;
}

// ─────────────────────────────────────────
// MÓDULO 4 — KPIs
// ─────────────────────────────────────────
function renderKPIs() {
  if (!allData) return;
  const ops = allData.ordenes || [];
  const ocs = allData.ordenes_compra || [];
  const wrap = document.getElementById('kpisWrap');
  document.getElementById('kpiDate').textContent = new Date().toLocaleDateString('es-CR',{weekday:'long',day:'numeric',month:'long'});

  // KPIs de producción
  const activas     = ops.filter(o => o.estado === 'En Producción').length;
  const completadas = ops.filter(o => o.estado === 'Completada').length;
  const bloqueadas  = ops.filter(o => o.prioridad === 'BLOQUEADA').length;
  const total       = ops.length;
  const eficiencia  = total > 0 ? Math.round((completadas / total) * 100) : 0;

  // KPIs de OCs — contar por CÓDIGO de OC, no por línea
  const hoy = new Date().toISOString().substring(0,10);
  const ocsActivas    = ocs.filter(o => !['entregado','cancelado'].includes((o.Status||'').toLowerCase()));
  const ocsParciales  = ocsActivas.filter(o => (o.Status||'').toLowerCase() === 'parcial');
  const totalUnidsPend = ocsActivas.reduce((s,o) => s + (parseFloat(o['Cantidad Pendiente']||o['Total Unds']||0)), 0);

  // Agrupar por código de OC para contar OCs únicas vencidas
  const codigosOCActivas = [...new Set(ocsActivas.map(o => o.OC || o.oc || ''))].filter(Boolean);
  const codigosOCVencidas = [...new Set(
    ocsActivas.filter(o => (o['Fecha de Entrega']||'') < hoy)
              .map(o => o.OC || o.oc || '')
  )].filter(Boolean);
  const ocsVencidas = codigosOCVencidas; // array de códigos únicos

  // SKUs más atrasados
  const skuAtraso = {};
  ocsVencidas.forEach(o => {
    const prod = o.Producto || o.producto || '';
    if (!skuAtraso[prod]) skuAtraso[prod] = { unds: 0, nOCs: 0 };
    skuAtraso[prod].unds  += parseFloat(o['Cantidad Pendiente']||o['Total Unds']||0);
    skuAtraso[prod].nOCs  += 1;
  });
  const topAtrasados = Object.entries(skuAtraso)
    .sort((a,b) => b[1].unds - a[1].unds).slice(0,8);

  // Por estación
  const estMap = {};
  ops.forEach(op => {
    if (!op.estacion) return;
    if (!estMap[op.estacion]) estMap[op.estacion] = { total:0, completadas:0, activas:0 };
    estMap[op.estacion].total++;
    if (op.estado === 'En Producción') estMap[op.estacion].activas++;
    if (op.estado === 'Completada')    estMap[op.estacion].completadas++;
  });

  wrap.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-card-label">Estaciones activas</div>
        <div class="kpi-card-val" style="color:#2ecc71">${activas}</div>
        <div class="kpi-card-sub">de ${Object.keys(estMap).length} con OPs</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card-label">OPs completadas</div>
        <div class="kpi-card-val" style="color:#3498db">${completadas}</div>
        <div class="kpi-card-sub">de ${total} órdenes totales</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card-label">OCs vencidas</div>
        <div class="kpi-card-val" style="color:${ocsVencidas.length>0?'#e74c3c':'#2ecc71'}">${ocsVencidas.length}</div>
        <div class="kpi-card-sub">de ${codigosOCActivas.length} OCs activas</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card-label">Unidades pendientes</div>
        <div class="kpi-card-val" style="color:#f39c12">${formatNum(Math.round(totalUnidsPend))}</div>
        <div class="kpi-card-sub">${ocsParciales.length} líneas parciales</div>
      </div>
    </div>

    ${topAtrasados.length > 0 ? `
    <div>
      <div class="por-estacion-title">SKUs con mayor atraso en OCs</div>
      ${topAtrasados.map(([prod, d]) => {
        const pct = Math.min(100, Math.round((d.unds / (topAtrasados[0][1].unds||1)) * 100));
        return `<div class="est-kpi-row">
          <div class="est-kpi-name" style="font-size:12px">${prod}</div>
          <div><div class="est-kpi-bar-track"><div class="est-kpi-bar-fill" style="width:${pct}%;background:#e74c3c"></div></div></div>
          <div class="est-kpi-num" style="color:#e74c3c">${formatNum(Math.round(d.unds))}</div>
          <div class="est-kpi-num">${d.nOCs} OC${d.nOCs>1?'s':''}</div>
          <div></div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <div>
      <div class="por-estacion-title">Estado por estación</div>
      ${Object.entries(estMap).sort((a,b) => b[1].activas - a[1].activas).map(([est, d]) => {
        const ef = d.total > 0 ? Math.round((d.completadas / d.total) * 100) : 0;
        return `<div class="est-kpi-row">
          <div class="est-kpi-name">${est}</div>
          <div><div class="est-kpi-bar-track"><div class="est-kpi-bar-fill" style="width:${ef}%"></div></div></div>
          <div class="est-kpi-num" style="color:${d.activas>0?'#2ecc71':'#4a5a78'}">${d.activas>0?'🟢':'⚫'} ${d.activas}</div>
          <div class="est-kpi-num">${d.total} OPs</div>
          <div class="est-kpi-num" style="color:${ef>=70?'#2ecc71':ef>=40?'#f39c12':'#e74c3c'}">${ef}%</div>
        </div>`;
      }).join('')}
    </div>`;
}



// ── UTILS ──
function formatNum(n) {
  if (!n && n !== 0) return '—';
  return Number(n).toLocaleString('es-CR');
}

function fmtDatetime(str) {
  if (!str) return '—';
  const d = new Date(str);
  if (isNaN(d)) return str;
  return d.toLocaleDateString('es-CR',{day:'2-digit',month:'2-digit'}) + ' ' +
         d.toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit'});
}

// ── BOOT ──
updateClock();
setInterval(updateClock, 1000);
fetchAll();
setInterval(fetchAll, REFRESH_MS);
</script>
