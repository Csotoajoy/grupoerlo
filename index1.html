<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="3600">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERLO IA · ETIQUETADO</title>

  <style>
    :root {
      --bg:#0a0c10;
      --surface:#111520;
      --border:#1e2535;
      --accent:#00e5ff;
      --green:#00e676;
      --yellow:#ffd740;
      --red:#ff1744;
      --text:#e8eaf6;
      --muted:#546e8a;
    }

    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      background:var(--bg);
      color:var(--text);
      font-family: Arial, Helvetica, sans-serif;
      height:100vh;
      overflow:hidden;
    }

    header {
      height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 28px;
      background:var(--surface);
      border-bottom:2px solid var(--border);
    }

    .title {
      font-size:30px;
      letter-spacing:4px;
      color:var(--accent);
      font-weight:bold;
    }

    .clock {
      font-size:26px;
      letter-spacing:3px;
    }

    main {
      padding:24px;
      height:calc(100vh - 72px);
      overflow:hidden;
    }

    h2 {
      font-size:24px;
      margin-bottom:16px;
      letter-spacing:2px;
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    thead th {
      font-size:13px;
      color:var(--muted);
      text-align:left;
      padding:10px;
      border-bottom:1px solid var(--border);
    }

    tbody td {
      font-size:20px;
      padding:14px 10px;
      border-bottom:1px solid rgba(30,37,53,0.6);
    }

    .URGENTE { color:var(--red); font-weight:bold; }
    .A { color:#ff6b35; font-weight:bold; }
    .B { color:var(--yellow); font-weight:bold; }
    .C { color:var(--muted); }

    .BLOQUEADA { color:var(--red); font-weight:bold; }
    .PENDIENTE { color:var(--yellow); }
    .EJECUCIÓN { color:var(--accent); }

    #loading {
      position:fixed;
      inset:0;
      background:var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      letter-spacing:3px;
      color:var(--accent);
      z-index:10;
    }
  </style>
</head>

<body>

<div id="loading">CARGANDO ÓRDENES DE ETIQUETADO…</div>

<header>
  <div class="title">ERLO IA · ETIQUETADO</div>
  <div class="clock" id="clock">00:00</div>
</header>

<main>
  <h2>ÓRDENES ACTIVAS – ESTACIÓN C</h2>

  <table>
    <thead>
      <tr>
        <th>OP</th>
        <th>Producto / SKU</th>
        <th>Prioridad</th>
        <th>Estado</th>
        <th>Cantidad</th>
      </tr>
    </thead>
    <tbody id="tabla-etiquetado"></tbody>
  </table>
</main>

<script>
/* ===============================
   CONFIGURACIÓN
================================ */
const OPS_URL =
  'https://raw.githubusercontent.com/Csotoajoy/grupoerlo/main/ps_ops.json';

const DATA_REFRESH_MS = 2 * 60 * 1000;

/* ===============================
   RELOJ
================================ */
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleTimeString('es-CR', { hour:'2-digit', minute:'2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

/* ===============================
   CARGA DE DATOS
================================ */
async function fetchData() {
  try {
    const res = await fetch(OPS_URL + '?t=' + Date.now());
    const json = await res.json();

    // ✅ CLAVE: data real viene en json.value
    renderEtiquetado(json.value || []);

    document.getElementById('loading').style.display = 'none';
  } catch (e) {
    console.error('Error cargando OPS:', e);
  }
}

/* ===============================
   RENDER ETIQUETADO
================================ */
function renderEtiquetado(ops) {
  const tbody = document.getElementById('tabla-etiquetado');

  const etiquetadoOps = ops.filter(o =>
    (o['Estación'] || '').toString().toLowerCase() === 'etiquetado'
  );

  tbody.innerHTML = etiquetadoOps.map(o => `
    <tr>
      <td>${o['OP Code'] || ''}</td>
      <td>${o['Producto/SKU'] || ''}</td>
      <td class="${o['Prioridad']}">${o['Prioridad']}</td>
      <td class="${(o['Estado'] || 'PENDIENTE').split(' ')[0]}">
        ${o['Estado'] || 'PENDIENTE'}
      </td>
      <td>${o['Cantidad'] || 0}</td>
    </tr>
  `).join('');
}

/* ===============================
   INIT
================================ */
fetchData();
setInterval(fetchData, DATA_REFRESH_MS);
</script>

</body>
</html>
