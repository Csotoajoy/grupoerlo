<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan de Trabajo · Grupo Erlo</title>
<style>
:root {
  --bg:#0d1117; --surface:#161b22; --surface2:#1c2128; --surface3:#21262d;
  --border:#30363d; --text:#e6edf3; --text-mid:#8b949e; --text-dim:#484f58;
  --green:#2ecc71; --amber:#f39c12; --red:#e74c3c; --blue:#3498db;
  --purple:#9b59b6; --teal:#1abc9c; --accent:#f0a500;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:200;}
.hdr-logo{color:var(--accent);font-weight:700;font-size:16px;}
.hdr-title{color:var(--text-mid);font-size:12px;}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:12px;}
.clock{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--text-dim);}
.dot.ok{background:var(--green);box-shadow:0 0 6px var(--green);}
.rbtn{background:var(--surface2);border:1px solid var(--border);color:var(--text-mid);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;}
.rbtn:hover{color:var(--text);}

/* KPI */
.kpi-bar{display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
.kpi{flex:1;background:var(--surface);padding:8px 10px;display:flex;flex-direction:column;align-items:center;gap:2px;}
.kv{font-size:18px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;}
.kl{font-size:9px;color:var(--text-mid);text-transform:uppercase;letter-spacing:.4px;text-align:center;}

/* LAYOUT */
.page{display:flex;height:calc(100vh - 104px);overflow:hidden;}

/* NAV */
.nav{width:210px;min-width:210px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:6px 0;}
.nav-sec{padding:6px 12px 2px;font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;}
.nav-maq{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:7px;border-left:3px solid transparent;transition:all .15s;}
.nav-maq:hover{background:var(--surface2);}
.nav-maq.active{background:var(--surface2);border-left-color:var(--accent);}
.nav-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.nav-name{font-size:12px;font-weight:500;flex:1;}
.nav-sacos{margin-left:auto;font-size:10px;color:var(--text-dim);font-variant-numeric:tabular-nums;}
.nav-molde{padding:4px 12px 4px 28px;cursor:pointer;font-size:11px;color:var(--text-mid);border-left:3px solid transparent;transition:all .12s;display:flex;justify-content:space-between;}
.nav-molde:hover{background:var(--surface2);color:var(--text);}
.nav-molde.active{color:var(--text);background:rgba(240,165,0,.06);border-left-color:rgba(240,165,0,.4);}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:14px;}

/* MAQ HEADER */
.maq-hdr{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;}
.maq-icon{font-size:22px;}
.maq-nm{font-size:17px;font-weight:700;}
.maq-sub{font-size:11px;color:var(--text-mid);margin-top:2px;}
.maq-badge{margin-left:auto;display:flex;gap:20px;align-items:center;}
.maq-stat{text-align:center;}
.maq-stat-v{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;}
.maq-stat-l{font-size:9px;color:var(--text-mid);text-transform:uppercase;}

/* RESINA BAR */
.res-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;font-size:12px;}
.res-track{flex:1;height:8px;border-radius:4px;background:var(--surface3);}
.res-fill{height:100%;border-radius:4px;}

/* MOLDE CARD */
.mc{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;}
.mc-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.mc-chev{color:var(--text-dim);font-size:10px;transition:transform .2s;flex-shrink:0;}
.mc-chev.open{transform:rotate(90deg);}
.mc-name{font-size:13px;font-weight:600;flex:1;}
.mc-stats{display:flex;gap:16px;align-items:center;}
.mc-stat{text-align:right;}
.mc-stat-v{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
.mc-stat-l{font-size:9px;color:var(--text-dim);text-transform:uppercase;}

/* SACO BLOCK VISUAL */
.saco-block{display:flex;flex-wrap:wrap;gap:3px;margin:2px 0;}
.saco{width:14px;height:18px;border-radius:2px;background:var(--accent);opacity:.85;}
.saco.empty{background:var(--surface3);border:1px solid var(--border);}

/* TABLE */
.ct{width:100%;border-collapse:collapse;}
.ct th{padding:6px 12px;font-size:9px;color:var(--text-dim);text-align:left;font-weight:600;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);background:var(--surface);white-space:nowrap;}
.ct td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.ct tr:last-child td{border-bottom:none;}
.ct tr:hover td{background:rgba(255,255,255,.02);}
.row-skip td{opacity:.4;}

/* ORDER NUM */
.ord{width:26px;height:26px;border-radius:50%;background:var(--surface3);border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-mid);flex-shrink:0;}
.ord.t1{background:rgba(240,165,0,.2);border-color:var(--accent);color:var(--accent);}
.ord.t2{background:rgba(231,76,60,.1);border-color:var(--red);color:var(--red);}
.ord.t3{background:rgba(243,156,18,.1);border-color:var(--amber);color:var(--amber);}

/* PRIOR */
.bp{display:inline-block;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:700;}
.bp-A{background:rgba(231,76,60,.2);color:#e74c3c;}
.bp-B{background:rgba(243,156,18,.2);color:#f39c12;}
.bp-C{background:rgba(52,152,219,.2);color:#3498db;}

/* SACO PILL */
.saco-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:5px;font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;background:rgba(240,165,0,.12);border:1px solid rgba(240,165,0,.3);color:var(--accent);}
.saco-sub{font-size:10px;color:var(--text-dim);margin-top:2px;}

/* KG bar */
.kgb{display:flex;align-items:center;gap:6px;}
.kgt{width:70px;height:5px;border-radius:3px;background:var(--surface3);}
.kgf{height:100%;border-radius:3px;}

/* STOCK */
.sp{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;font-size:11px;font-variant-numeric:tabular-nums;}
.sp-ok{background:rgba(46,204,113,.1);color:var(--green);border:1px solid rgba(46,204,113,.25);}
.sp-warn{background:rgba(243,156,18,.1);color:var(--amber);border:1px solid rgba(243,156,18,.25);}
.sp-no{background:rgba(231,76,60,.1);color:var(--red);border:1px solid rgba(231,76,60,.25);}
.sp-ok2{background:rgba(52,152,219,.1);color:var(--blue);border:1px solid rgba(52,152,219,.25);}

/* PESO BADGE */
.peso-badge{font-size:10px;padding:1px 5px;border-radius:3px;font-variant-numeric:tabular-nums;}
.pb-med{background:rgba(46,204,113,.1);color:var(--green);border:1px solid rgba(46,204,113,.2);}
.pb-est{background:rgba(155,89,182,.1);color:var(--purple);border:1px solid rgba(155,89,182,.2);}

.prod-ref{font-size:10px;color:var(--text-dim);}
.no-dem{padding:12px 16px;text-align:center;color:var(--text-dim);font-size:12px;}
.tag-oc{font-size:10px;color:var(--amber);}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">ERLO</div>
  <div class="hdr-title">Plan de Trabajo · Inyección &amp; Soplado</div>
  <div class="hdr-r">
    <span class="dot" id="dot"></span>
    <div class="clock" id="clk">00:00</div>
    <button class="rbtn" onclick="fetchLive()">↻ Actualizar</button>
  </div>
</div>

<div class="kpi-bar">
  <div class="kpi"><div class="kv" id="kSacos" style="color:var(--accent)">—</div><div class="kl">Sacos totales</div></div>
  <div class="kpi"><div class="kv" id="kKg" style="color:var(--accent)">—</div><div class="kl">Kg totales</div></div>
  <div class="kpi"><div class="kv" id="kMoldes">—</div><div class="kl">Moldes activos</div></div>
  <div class="kpi"><div class="kv" id="kColores">—</div><div class="kl">Corridas</div></div>
  <div class="kpi"><div class="kv" id="kPiezas" style="color:var(--green)">—</div><div class="kl">Piezas a producir</div></div>
  <div class="kpi"><div class="kv" id="kResMed" style="color:var(--green)">—</div><div class="kl">Con peso medido</div></div>
  <div class="kpi"><div class="kv" id="kResKg" style="color:var(--amber)">—</div><div class="kl">Resina disponible</div></div>
</div>

<div class="page">
  <nav class="nav" id="navPanel"></nav>
  <div class="main" id="mainPanel"><div style="padding:48px;text-align:center;color:var(--text-dim)">Cargando…</div></div>
</div>

// FETCH
async function fetchLive(){
  const dot=document.getElementById('dot');
  dot.className='dot';
  try{
    const t=Date.now();
    const [aRes,pRes]=await Promise.all([fetch(URLS.ALL+'?t='+t),fetch(URLS.PEDIDOS+'?t='+t)]);
    const [aJson,pJson]=await Promise.all([aRes.json(),pRes.json()]);
    liveSkuInv={};
    (aJson.inventario_sku||[]).forEach(s=>{
      const k=(s.descripcion||'').trim().toUpperCase();
      liveSkuInv[k]=(liveSkuInv[k]||0)+(parseFloat(s.unds)||0);
    });
    liveResinas={};
    (aJson.insumos||[]).forEach(i=>{
      if(i.Subcategoría==='Resinas'||i.Subcategoría==='Master Batch')
        liveResinas[i.Titulo]=parseFloat(i.Cantidad)||0;
    });
    const hoy=new Date().toISOString().substring(0,10);
    liveOCs={};
    (pJson.pedidos||aJson.ordenes_compra||[]).forEach(o=>{
      const st=(o.Status||'').toLowerCase();
      if(st==='entregado'||st==='cancelado')return;
      const cod=o.Code||''; if(!cod)return;
      const pend=parseFloat(o['Cantidad Pendiente']||o['Total Unds']||0);
      const venc=(o['Fecha de Entrega']||'')<hoy;
      if(!liveOCs[cod])liveOCs[cod]={pendiente:0,vencidas:0};
      liveOCs[cod].pendiente+=pend;
      if(venc)liveOCs[cod].vencidas++;
    });
    dot.className='dot ok';
  }catch(e){dot.className='dot';}
  buildPlan();
  renderAll();
}

function getSKUInv(skuName){
  const k=skuName.trim().toUpperCase();
  return liveSkuInv[k]!==undefined ? liveSkuInv[k] : 0;
}

// BUILD PLAN
function buildPlan(){
  plan={};
  let totSacos=0,totMoldes=0,totColores=0,totPiezas=0,totMed=0;

  Object.entries(PLAN_BASE).forEach(([maqName,maqBase])=>{
    plan[maqName]={tipo_resina:maqBase.tipo_resina,color:MAQ_COLORS[maqName],icon:MAQ_ICONS[maqName],moldes:[]};
    maqBase.moldes.forEach(mb=>{
      const colores=mb.colores.map(c=>{
        const inv=getSKUInv(c.sku)||c.inv_actual;
        const dem=c.demanda_total;
        const def=Math.max(0,dem-inv);
        const pesoGr=PESOS_GR[c.sku]||PESOS_GR[c.sku.trim()]||null;
        let kgExactos=0,sacos=0,kgReales=0;
        if(def>0){
          if(pesoGr){kgExactos=(def*pesoGr)/1000;}
          else{kgExactos=c.kg_exactos||c.kg_reales||0;}
          sacos=Math.ceil(kgExactos/SACO_KG)||1;
          kgReales=sacos*SACO_KG;
        }
        return{...c,inv_actual:Math.round(inv),deficit:Math.round(def),peso_gr:pesoGr,peso_fuente:pesoGr?'medido':'estimado',kg_exactos:Math.round(kgExactos*100)/100,sacos,kg_reales:kgReales};
      });
      colores.sort((a,b)=>b.sacos-a.sacos||({'A':0,'B':1,'C':2}[a.prioridad]||3)-({'A':0,'B':1,'C':2}[b.prioridad]||3));
      const totS=colores.reduce((s,c)=>s+c.sacos,0);
      const totD=colores.reduce((s,c)=>s+c.deficit,0);
      plan[maqName].moldes.push({molde:mb.molde,total_sacos:totS,total_kg:totS*SACO_KG,deficit_total:Math.round(totD),colores});
      if(totS>0){totMoldes++;totColores+=colores.filter(c=>c.sacos>0).length;}
      totSacos+=totS;totPiezas+=totD;
    });
    plan[maqName].moldes.sort((a,b)=>b.total_sacos-a.total_sacos);
  });

  // Count medidos
  Object.values(plan).forEach(m=>m.moldes.forEach(md=>md.colores.forEach(c=>{if(c.sacos>0&&c.peso_fuente==='medido')totMed++;})));

  document.getElementById('kSacos').textContent=totSacos.toLocaleString('es-CR');
  document.getElementById('kKg').textContent=(totSacos*SACO_KG).toLocaleString('es-CR')+' kg';
  document.getElementById('kMoldes').textContent=totMoldes;
  document.getElementById('kColores').textContent=totColores;
  document.getElementById('kPiezas').textContent=Math.round(totPiezas/1000).toLocaleString('es-CR')+'k';
  document.getElementById('kResMed').textContent=totMed+' SKUs';
  const rTot=Object.values(liveResinas).reduce((a,b)=>a+b,0)||(6800+3750+1050+325+2186);
  document.getElementById('kResKg').textContent=Math.round(rTot).toLocaleString('es-CR')+' kg';
}

// NAV
function renderNav(){
  const nav=document.getElementById('navPanel');
  let html='<div class="nav-sec">Máquinas</div>';
  Object.entries(plan).forEach(([nm,md])=>{
    const active=nm===activeMaq;
    const totS=md.moldes.reduce((s,m)=>s+m.total_sacos,0);
    html+=`<div class="nav-maq ${active?'active':''}" onclick="selMaq('${nm}')">
      <div class="nav-dot" style="background:${md.color}"></div>
      <div class="nav-name">${nm}</div>
      <div class="nav-sacos">${totS}s</div>
    </div>`;
    if(active){
      md.moldes.filter(m=>m.total_sacos>0).forEach(m=>{
        const shortName=m.molde.replace(/ \(.*?\)/,'');
        html+=`<div class="nav-molde" onclick="scrollToMolde('${encodeURIComponent(m.molde)}')">
          <span>· ${shortName}</span><span style="color:var(--text-dim)">${m.total_sacos}s</span>
        </div>`;
      });
    }
  });
  nav.innerHTML=html;
}

function selMaq(nm){
  activeMaq=nm;
  openMoldes=new Set(plan[nm].moldes.filter(m=>m.total_sacos>0).map(m=>m.molde));
  renderAll();
}

function scrollToMolde(enc){
  const nm=decodeURIComponent(enc);
  openMoldes.add(nm);
  renderMain();
  setTimeout(()=>{
    const el=document.querySelector(`[data-molde-id="${enc}"]`);
    if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  },50);
}

function toggleMolde(molde){
  if(openMoldes.has(molde))openMoldes.delete(molde);
  else openMoldes.add(molde);
  renderMain();
}

        <span class="mc-chev ${isOpen?'open':''}">▶</span>
        <div style="flex:1">
          <div class="mc-name">${m.molde}</div>
          <div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px">${sacosVis}</div>
        </div>
        <div class="mc-stats">
          <div class="mc-stat"><div class="mc-stat-v" style="color:var(--accent)">${m.total_sacos}</div><div class="mc-stat-l">Sacos</div></div>
          <div class="mc-stat"><div class="mc-stat-v" style="color:var(--accent)">${m.total_kg.toLocaleString('es-CR')} kg</div><div class="mc-stat-l">A preparar</div></div>
          <div class="mc-stat"><div class="mc-stat-v">${colActivos.length}</div><div class="mc-stat-l">Corridas</div></div>
          <div class="mc-stat"><div class="mc-stat-v" style="color:var(--text-mid)">${m.deficit_total.toLocaleString('es-CR')}</div><div class="mc-stat-l">Piezas</div></div>
        </div>
      </div>`;

    if(isOpen){
      html+=`<table class="ct">
        <thead><tr>
          <th style="width:36px">#</th>
          <th>SKU / Color</th>
          <th>Prior</th>
          <th>Stock SKU</th>
          <th>Déficit</th>
          <th>Peso / u</th>
          <th>Sacos × 25kg</th>
          <th>Kg exactos</th>
          <th>Kg a pesar</th>
          <th>Productos</th>
        </tr></thead><tbody>`;

      let orden=1;
      m.colores.forEach(c=>{
        const skip=c.sacos===0;
        const invPct=c.demanda_total>0?Math.round((c.inv_actual/c.demanda_total)*100):100;
        const spCls=invPct>=100?'sp-ok2':invPct>=50?'sp-warn':'sp-no';
        const ordCls=orden===1?'t1':orden===2?'t2':orden===3?'t3':'';
        const pct=Math.min(100,maxSacos>0?Math.round((c.sacos/maxSacos)*100):0);
        const barCol=orden===1?'var(--accent)':orden<=3?'var(--amber)':'var(--text-mid)';
        const pesoHtml=c.peso_gr
          ?`<span class="peso-badge pb-med">📏 ${c.peso_gr}g</span>`
          :`<span class="peso-badge pb-est">~ est.</span>`;

        // Sacos block mini
        const miniSacos=Math.min(c.sacos,12);
        let miniVis='<div style="display:flex;flex-wrap:wrap;gap:2px">';
        for(let i=0;i<miniSacos;i++)miniVis+=`<div style="width:10px;height:13px;border-radius:1px;background:${skip?'var(--surface3)':'var(--accent)'}"></div>`;
        if(c.sacos>12)miniVis+=`<span style="font-size:9px;color:var(--text-dim);align-self:center">+${c.sacos-12}</span>`;
        miniVis+='</div>';

        const prodsRef=c.productos&&c.productos.length>0?c.productos.slice(0,2).join(', '):'—';

        html+=`<tr class="${skip?'row-skip':''}">
          <td>${skip?'<span class="ord">—</span>':`<span class="ord ${ordCls}">${orden}</span>`}</td>
          <td>
            <div style="font-weight:500">${c.sku}</div>
            ${skip?'<div style="font-size:10px;color:var(--green)">✓ Sin déficit</div>':''}
          </td>
          <td><span class="bp bp-${c.prioridad}">${c.prioridad}</span></td>
          <td><span class="sp ${spCls}">${c.inv_actual.toLocaleString('es-CR')}</span><div style="font-size:10px;color:var(--text-dim)">${invPct}% cob.</div></td>
          <td style="font-variant-numeric:tabular-nums;color:${skip?'var(--text-dim)':'var(--red)'}">${c.deficit.toLocaleString('es-CR')}</td>
          <td>${pesoHtml}</td>
          <td>
            ${skip?'—':`<div class="saco-pill">🎒 ${c.sacos} saco${c.sacos!==1?'s':''}</div>
            ${miniVis}`}
          </td>
          <td style="font-variant-numeric:tabular-nums;font-size:12px;color:var(--text-mid)">${skip?'—':c.kg_exactos+' kg'}</td>
          <td style="font-variant-numeric:tabular-nums;font-size:13px;font-weight:600;color:${skip?'var(--text-dim)':'var(--accent)'}">${skip?'—':c.kg_reales.toLocaleString('es-CR')+' kg'}</td>
          <td><div class="prod-ref">${prodsRef}</div></td>
        </tr>`;
        if(!skip)orden++;
      });
      html+=`</tbody></table>`;
    }
    html+=`</div>`;
  });

  if(sinDem.length>0){
    html+=`<div style="margin-top:12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:12px">
      ✅ Sin producción requerida: ${sinDem.map(m=>m.molde.replace(/ \(.*?\)/,'')).join(' · ')}
    </div>`;
  }
  main.innerHTML=html;
}

function renderAll(){renderNav();renderMain();}

// INIT
buildPlan();
Object.keys(plan).forEach(maq=>plan[maq].moldes.filter(m=>m.total_sacos>0).forEach(m=>openMoldes.add(m.molde)));
renderAll();
fetchLive();
setInterval(fetchLive,REFRESH_MS);
</script>
</body>
</html>
