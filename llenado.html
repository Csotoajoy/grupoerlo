<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="3600">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERLO IA · LLENADO</title>

  <style>
    body { background:#0a0c10; color:#e8eaf6; font-family:Arial,sans-serif; margin:0 }
    header{ padding:16px 24px; background:#111520; border-bottom:2px solid #1e2535;
            display:flex; justify-content:space-between; align-items:center }
    h1{ margin:0; color:#00e5ff; letter-spacing:4px }
    table{ width:100%; border-collapse:collapse; margin:16px }
    th{ color:#546e8a; text-align:left; border-bottom:1px solid #1e2535; padding:8px }
    td{ padding:10px; border-bottom:1px solid #1e2535; font-size:18px }
    .URGENTE{ color:#ff1744; font-weight:bold }
    .BLOQUEADA{ color:#ff1744; font-weight:bold }
    .clock{ font-size:22px }
    #loading{ position:fixed; inset:0; display:flex; align-items:center;
              justify-content:center; background:#0a0c10; color:#00e5ff }
  </style>
</head>

<body>

<div id="loading">CARGANDO ÓRDENES DE LLENADO…</div>

<header>
  <h1>ERLO IA · LLENADO</h1>
  <div class="clock" id="clock"></div>
</header>

<table>
  <thead>
    <tr>
      <th>OP</th>
      <th>Producto</th>
      <th>Prioridad</th>
      <th>Estado</th>
      <th>Cantidad</th>
      <th>Stock</th>
    </tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<script>
const URL = 'https://raw.githubusercontent.com/Csotoajoy/grupoerlo/main/ps_ops.json';

function clock(){
  document.getElementById('clock').innerText =
    new Date().toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit'});
}
setInterval(clock,1000); clock();

async function load(){
  const res = await fetch(URL + '?t=' + Date.now());
  const data = await res.json(); // ✅ data ES EL ARRAY REAL

  const llenado = data.filter(o =>
    String(o['Estación']).toLowerCase() === 'llenado'
  );

  document.getElementById('rows').innerHTML = llenado.map(o => `
    <tr>
      <td>${o['OP Code']}</td>
      <td>${o['Producto/SKU']}</td>
      <td class="${o['Prioridad']}">${o['Prioridad']}</td>
      <td class="${o['Estado']}">${o['Estado'] || 'PENDIENTE'}</td>
      <td>${o['Cantidad']}</td>
      <td>${o['Unds Stok']}</td>
    </tr>
  `).join('');

  document.getElementById('loading').style.display='none';
}

load();
setInterval(load, 120000);
</script>

</body>
</html>
