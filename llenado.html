<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="3600"> <!-- HARD REFRESH 1h -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ERLO IA – LLENADO</title>

  <style>
    :root {
      --bg:#0a0c10;
      --surface:#111520;
      --border:#1e2535;
      --accent:#00e5ff;
      --green:#00e676;
      --yellow:#ffd740;
      --red:#ff1744;
      --text:#e8eaf6;
      --muted:#546e8a;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
      height:100vh;
      overflow:hidden;
    }

    header{
      height:70px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 28px;
      background:var(--surface);
      border-bottom:2px solid var(--border);
    }

    .title{
      font-size:32px;
      letter-spacing:4px;
      color:var(--accent);
      font-weight:bold;
    }

    .clock{
      font-size:28px;
      letter-spacing:3px;
    }

    main{
      padding:24px;
      height:calc(100vh - 70px);
      overflow:hidden;
    }

    .section-title{
      font-size:26px;
      margin-bottom:16px;
      letter-spacing:2px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th{
      text-align:left;
      color:var(--muted);
      font-size:14px;
      border-bottom:1px solid var(--border);
      padding:10px;
    }

    td{
      padding:14px 10px;
      font-size:20px;
      border-bottom:1px solid rgba(30,37,53,0.6);
    }

    .priority{
      font-weight:bold;
    }

    .URGENTE{color:var(--red)}
    .A{color:#ff6b35}
    .B{color:var(--yellow)}
    .C{color:var(--muted)}

    .estado{
      font-weight:bold;
    }

    .BLOQUEADA{color:var(--red)}
    .PENDIENTE{color:var(--yellow)}
    .EN{color:var(--accent)}

    .stock-ok{color:var(--green)}
    .stock-low{color:var(--yellow)}
    .stock-zero{color:var(--red)}

    #loading{
      position:fixed;
      inset:0;
      background:var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      letter-spacing:4px;
      color:var(--accent);
    }
  </style>
</head>

<body>

<div id="loading">CARGANDO LLENADO…</div>

<header>
  <div class="title">ERLO IA · LLENADO</div>
  <div class="clock" id="clock">00:00</div>
</header>

<main>
  <div class="section-title">ÓRDENES ACTIVAS – ESTACIÓN D</div>

  <table>
    <thead>
      <tr>
        <th>OP</th>
        <th>SKU</th>
        <th>PRIORIDAD</th>
        <th>ESTADO</th>
        <th>AVANCE</th>
        <th>STOCK PT</th>
      </tr>
    </thead>
    <tbody id="tabla-llenado"></tbody>
  </table>
</main>

<script>
/* ===============================
   CONFIGURACIÓN
================================ */
const OPS_URL = 'https://raw.githubusercontent.com/Csotoajoy/grupoerlo/main/ps_ops.json';
const INV_URL = 'https://raw.githubusercontent.com/Csotoajoy/grupoerlo/main/ps_inventario.json';

const DATA_REFRESH_MS = 2 * 60 * 1000;

/* ===============================
   UTILIDADES
================================ */
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent =
    n.toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock,1000);
updateClock();

function clsStock(v){
  if(v<=0) return 'stock-zero';
  if(v<1000) return 'stock-low';
  return 'stock-ok';
}

/* ===============================
   CARGA DE DATOS
================================ */
async function fetchData(){
  try{
    const [opsRes, invRes] = await Promise.all([
      fetch(OPS_URL + '?t=' + Date.now()),
      fetch(INV_URL + '?t=' + Date.now())
    ]);

    const opsData = await opsRes.json();
    const invData = await invRes.json();

    renderLlenado(
      opsData.ops || [],
      invData.invPT || []
    );

    document.getElementById('loading').style.display='none';
  }catch(e){
    console.error(e);
  }
}

/* ===============================
   RENDER LLENADO
================================ */
function renderLlenado(ops, invPT){
  const tbody = document.getElementById('tabla-llenado');

  const llenadoOps = ops
    .filter(o => o.estacion?.includes('Llenado'));

  tbody.innerHTML = llenadoOps.map(o=>{
    const pt = invPT.find(i => i.descripcion === o.sku);
    const stock = pt?.unds ?? 0;

    return `
      <tr>
        <td>${o.opCode || ''}</td>
        <td>${o.sku}</td>
        <td class="priority ${o.prioridad}">${o.prioridad}</td>
        <td class="estado ${o.estado?.split(' ')[0]}">${o.estado}</td>
        <td>${Math.round((o.cantidadProducida||0)/(o.cantidad||1)*100)}%</td>
        <td class="${clsStock(stock)}">${stock}</td>
      </tr>
    `;
  }).join('');
}

/* ===============================
   INIT
================================ */
fetchData();
setInterval(fetchData, DATA_REFRESH_MS);
</script>

</body>
</html>
