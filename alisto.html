<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Alisto — Grupo Erlo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#070b11; --surface:#0e1520; --surface2:#131d2c; --surface3:#182030;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.14);
  --text:#eef2ff; --text-dim:#4a5a78; --text-mid:#8090b0;
  --green:#2ecc71; --amber:#f39c12; --red:#e74c3c;
  --blue:#3498db; --purple:#9b59b6; --accent:#0080ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;gap:16px;}
.logo-area{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.logo-box{width:40px;height:40px;background:linear-gradient(135deg,#1a3a6e,#0d2244);border:1px solid rgba(0,128,255,0.3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:16px;color:#4af;}
.logo-title{line-height:1.2;}
.company{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:var(--text-mid);text-transform:uppercase;letter-spacing:.05em;}
.page-sub{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;}
.header-center{display:flex;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px;}
.modo-btn{padding:6px 18px;border:none;border-radius:6px;background:transparent;color:var(--text-dim);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;cursor:pointer;letter-spacing:.05em;transition:.2s;text-transform:uppercase;}
.modo-btn.active{background:var(--accent);color:#fff;}
.header-right{display:flex;align-items:center;gap:12px;}
.clock{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:var(--text-mid);}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--text-dim);}
.status-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green);}
.refresh-btn{padding:6px 14px;background:rgba(255,255,255,0.06);border:1px solid var(--border2);border-radius:6px;color:var(--text-mid);font-family:'Barlow',sans-serif;font-size:12px;cursor:pointer;transition:.2s;}
.refresh-btn:hover{background:rgba(255,255,255,0.1);color:var(--text);}

/* ── FILTROS (modo lista) ── */
.toolbar{display:flex;align-items:center;gap:10px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0;flex-wrap:wrap;}
.filter-btn{padding:5px 12px;border:1px solid var(--border2);border-radius:20px;background:transparent;color:var(--text-mid);font-family:'Barlow',sans-serif;font-size:11px;cursor:pointer;transition:.2s;text-transform:uppercase;letter-spacing:.05em;}
.filter-btn.active,.filter-btn.f-red.active{border-color:var(--accent);color:var(--accent);background:rgba(0,128,255,0.1);}
.filter-btn.f-red.active{border-color:var(--red);color:var(--red);background:rgba(231,76,60,0.1);}
.filter-btn.f-amber.active{border-color:var(--amber);color:var(--amber);background:rgba(243,156,18,0.1);}
.filter-btn.f-green.active{border-color:var(--green);color:var(--green);background:rgba(46,204,113,0.1);}
.filter-btn.f-purple.active{border-color:var(--purple);color:var(--purple);background:rgba(155,89,182,0.1);}
.search-box{padding:5px 12px;background:var(--surface3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'Barlow',sans-serif;font-size:12px;width:200px;}
.search-box::placeholder{color:var(--text-dim);}
.search-box:focus{outline:none;border-color:var(--accent);}
.toolbar-count{margin-left:auto;font-size:12px;color:var(--text-dim);}

/* ── CONTENIDO ── */
.content{flex:1;overflow-y:auto;overflow-x:hidden;}

/* ── LOADER ── */
.loader{display:flex;align-items:center;justify-content:center;gap:12px;height:200px;color:var(--text-dim);font-size:14px;}
.spin{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;}
.empty-icon{font-size:48px;opacity:.3;}
.empty-text{color:var(--text-dim);font-size:14px;}

/* ═══════════════════════════════════════════════
   KANBAN — PANTALLA PLANTA 55" / 5M+
═══════════════════════════════════════════════ */
.kanban-wrap{display:flex;gap:0;height:100%;overflow:hidden;}

/* Columnas */
.kanban-col{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);min-width:0;}
.kanban-col:last-child{border-right:none;}

.kanban-col-header{padding:18px 20px 14px;border-bottom:2px solid var(--border2);flex-shrink:0;position:sticky;top:0;z-index:10;background:var(--surface);}
.kanban-col-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;letter-spacing:.05em;text-transform:uppercase;}
.kanban-col-title.col-red{color:var(--red);}
.kanban-col-title.col-amber{color:var(--amber);}
.kanban-col-title.col-green{color:var(--green);}
.kanban-col-count{font-family:'Barlow Condensed',sans-serif;font-size:16px;color:var(--text-dim);margin-top:2px;}

.kanban-col-body{flex:1;overflow-y:auto;padding:12px 12px 24px;}

/* Grupo de ruta dentro de columna */
.ruta-grupo{margin-bottom:16px;}
.ruta-label{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:6px 6px 0 0;margin-bottom:0;}
.ruta-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ruta-nombre{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-mid);}
.ruta-subtotal{margin-left:auto;font-size:14px;color:var(--text-dim);font-family:'Barlow Condensed',sans-serif;}

/* Separador de viaje/batch dentro de una ruta */
.viaje-sep{display:flex;align-items:center;gap:8px;padding:4px 12px 4px;margin:6px 0 4px;}
.viaje-fecha{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;}
.viaje-badge{padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;}
.viaje-badge.vencida{background:rgba(231,76,60,0.2);color:var(--red);}
.viaje-badge.urgente{background:rgba(243,156,18,0.2);color:var(--amber);}
.viaje-badge.ok{background:rgba(46,204,113,0.1);color:var(--green);}
.viaje-sep-line{flex:1;height:1px;background:var(--border);}

/* ── TARJETA OC (KANBAN) ── */
.koc-card{background:var(--surface2);border-radius:8px;margin-bottom:8px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:.15s;position:relative;}
.koc-card:hover{border-color:var(--border2);background:var(--surface3);}
.koc-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.koc-card.bloqueada::before{background:var(--red);}
.koc-card.alisto::before{background:var(--amber);}
.koc-card.parcial::before{background:var(--purple);}
.koc-card.lista::before{background:var(--green);}

.koc-main{padding:14px 16px 10px 18px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.koc-left{min-width:0;flex:1;}
.koc-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:36px;line-height:1;color:var(--text);letter-spacing:-.01em;}
.koc-cliente{font-size:15px;color:var(--text-mid);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.koc-right{text-align:right;flex-shrink:0;}
.koc-unds{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:40px;line-height:1;color:var(--text);}
.koc-unds-label{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;}

.koc-meta{padding:6px 16px 12px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.koc-fecha{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;}
.koc-fecha.vencida{color:var(--red);}
.koc-fecha.urgente{color:var(--amber);}
.koc-fecha.ok{color:var(--text-mid);}
.koc-dias{padding:2px 8px;border-radius:4px;font-size:13px;font-weight:700;font-family:'Barlow Condensed',sans-serif;}
.koc-dias.vencida{background:rgba(231,76,60,0.2);color:var(--red);}
.koc-dias.urgente{background:rgba(243,156,18,0.2);color:var(--amber);}
.koc-dias.ok{background:rgba(46,204,113,0.1);color:var(--green);}
.koc-cajas{font-size:15px;color:var(--text-dim);margin-left:auto;font-family:'Barlow Condensed',sans-serif;}
.koc-alerta{font-size:13px;color:var(--red);padding:0 16px 10px 18px;display:flex;align-items:center;gap:6px;}

/* ═══════════════════════════════════════════════
   MODO LISTA (resumen clásico) — igual que antes
═══════════════════════════════════════════════ */
.list-wrap{padding:20px 24px;}
.oc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px;}
.oc-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:.2s;}
.oc-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.oc-card.bloqueada{border-left:3px solid var(--red);}
.oc-card.alisto,.oc-card.parcial{border-left:3px solid var(--amber);}
.oc-card.lista{border-left:3px solid var(--green);}
.oc-card-header{padding:14px 16px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.oc-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;}
.oc-cliente{font-size:11px;color:var(--text-mid);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px;}
.oc-status-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
.badge-alisto{background:rgba(243,156,18,0.15);color:var(--amber);border:1px solid rgba(243,156,18,0.3);}
.badge-parcial{background:rgba(155,89,182,0.15);color:var(--purple);border:1px solid rgba(155,89,182,0.3);}
.badge-lista{background:rgba(46,204,113,0.15);color:var(--green);border:1px solid rgba(46,204,113,0.3);}
.badge-bloqueada{background:rgba(231,76,60,0.15);color:var(--red);border:1px solid rgba(231,76,60,0.3);}
.oc-fecha-row{padding:0 16px 10px;display:flex;align-items:center;gap:8px;}
.oc-fecha-label{font-size:11px;color:var(--text-dim);}
.oc-fecha-val{font-size:11px;font-weight:600;}
.oc-fecha-val.vencida{color:var(--red);}
.oc-fecha-val.urgente{color:var(--amber);}
.oc-fecha-val.ok{color:var(--green);}
.dias-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.dias-badge.vencida{background:rgba(231,76,60,0.15);color:var(--red);}
.dias-badge.urgente{background:rgba(243,156,18,0.15);color:var(--amber);}
.dias-badge.ok{background:rgba(46,204,113,0.1);color:var(--green);}
.oc-alerta{padding:6px 16px;font-size:11px;color:var(--red);display:flex;align-items:center;gap:6px;border-top:1px solid rgba(231,76,60,0.15);}
.oc-progress-wrap{padding:8px 16px 10px;}
.oc-progress-labels{display:flex;justify-content:space-between;margin-bottom:5px;}
.oc-progress-pct{font-size:12px;font-weight:600;}
.oc-progress-nums{font-size:11px;color:var(--text-dim);}
.progress-track{height:3px;background:var(--border2);border-radius:2px;}
.progress-bar{height:100%;border-radius:2px;transition:width .5s;}
.pb-green{background:var(--green);}
.pb-amber{background:var(--amber);}
.pb-red{background:var(--red);}
.pb-purple{background:var(--purple);}
.oc-lineas-row{padding:8px 16px;display:flex;gap:12px;border-top:1px solid var(--border);}
.oc-linea-stat{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-dim);}
.dot-stat{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── DETALLE OC ── */
.detail-wrap{padding:20px 24px;}
.detail-back{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.back-btn{padding:6px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text-mid);font-size:12px;cursor:pointer;transition:.2s;}
.back-btn:hover{background:var(--surface3);color:var(--text);}
.detail-oc-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:32px;}
.detail-cliente{font-size:13px;color:var(--text-mid);margin-left:4px;}
.detail-venc{font-size:12px;font-weight:700;margin-left:8px;}
.detail-venc.vencida{color:var(--red);}
.detail-venc.urgente{color:var(--amber);}
.detail-venc.ok{color:var(--green);}
.detail-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;}
.summary-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:6px;}
.summary-val{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:36px;line-height:1;}
.summary-val.red{color:var(--red);}
.summary-val.amber{color:var(--amber);}
.lineas-list{display:flex;flex-direction:column;gap:10px;}
.linea-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;}
.linea-card.bloqueada{border-left:3px solid var(--red);}
.linea-card.disponible{border-left:3px solid var(--green);}
.linea-card.parcial{border-left:3px solid var(--purple);}
.linea-producto{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;}
.linea-codigo{font-size:11px;color:var(--text-dim);margin-bottom:8px;}
.linea-stats{display:flex;gap:16px;flex-wrap:wrap;}
.linea-stat{font-size:12px;color:var(--text-mid);}
.linea-stat span{font-weight:600;color:var(--text);}
.linea-stat span.red{color:var(--red);}
.linea-stat span.green{color:var(--green);}
.linea-status-badge{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;text-align:center;}
.linea-alerta{margin-top:8px;font-size:11px;color:var(--red);grid-column:1/-1;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo-area">
    <div class="logo-box">GE</div>
    <div class="logo-title">
      <div class="company">Grupo Erlo</div>
      <div class="page-sub">E-Alisto</div>
    </div>
  </div>
  <div class="header-center">
    <button class="modo-btn active" id="btnKanban" onclick="setModo('kanban')">⊞ Kanban</button>
    <button class="modo-btn" id="btnLista" onclick="setModo('lista')">≡ Lista</button>
    <button class="modo-btn" id="btnDetalle" onclick="setModo('detalle')" disabled>◎ Detalle OC</button>
  </div>
  <div class="header-right">
    <div class="status-dot" id="statusDot"></div>
    <div class="clock" id="clock">--:--</div>
    <button class="refresh-btn" onclick="fetchData()">↻ Actualizar</button>
  </div>
</div>

<!-- FILTROS (solo modo lista) -->
<div class="toolbar" id="toolbar" style="display:none;">
  <button class="filter-btn active" onclick="setFiltro('todos',this)">Todos</button>
  <button class="filter-btn f-red" onclick="setFiltro('bloqueada',this)">🔴 Bloqueadas</button>
  <button class="filter-btn f-amber" onclick="setFiltro('alisto',this)">🟡 En proceso</button>
  <button class="filter-btn f-green" onclick="setFiltro('lista',this)">🟢 Listas</button>
  <input class="search-box" id="searchBox" type="text" placeholder="Buscar OC o cliente…" oninput="renderLista()">
  <span class="toolbar-count" id="toolbarCount"></span>
</div>

<!-- CONTENIDO -->
<div class="content" id="content">
  <div class="loader"><div class="spin"></div>Cargando datos…</div>
</div>

<script src="config.js"></script>
<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const URLS = (typeof ERLO_CONFIG !== 'undefined') ? ERLO_CONFIG.DATA : {
  INVENTARIO: 'https://csotoajoy.github.io/grupoerlo/ps_inventario.json',
  PEDIDOS:    'https://csotoajoy.github.io/grupoerlo/ps_pedidos.json',
  OPS:        'https://csotoajoy.github.io/grupoerlo/ps_data.json',
  RUTAS:      'https://csotoajoy.github.io/grupoerlo/ps_rutas.json',
};
const REFRESH_MS = (typeof ERLO_CONFIG !== 'undefined' && ERLO_CONFIG.REFRESH_MS) || 30000;
const RUTAS_URL  = (URLS.RUTAS) || 'https://csotoajoy.github.io/grupoerlo/ps_rutas.json';

let allData  = null;
let rutasData= null;   // { ventana_viaje_dias, rutas: [...] }
let modo     = 'kanban';
let filtro   = 'todos';
let ocSeleccionada = null;

// ── RELOJ ────────────────────────────────────────────────────────────────────
function tickClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.getHours().toString().padStart(2,'0') + ':' +
    now.getMinutes().toString().padStart(2,'0');
}
setInterval(tickClock, 1000); tickClock();

// ── FETCH ────────────────────────────────────────────────────────────────────
async function fetchData() {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot';
  try {
    const t = Date.now();
    const [invRes, pedRes, opsRes, rutRes] = await Promise.all([
      fetch(URLS.INVENTARIO + '?t=' + t),
      fetch(URLS.PEDIDOS    + '?t=' + t),
      fetch(URLS.OPS        + '?t=' + t),
      fetch(RUTAS_URL       + '?t=' + t),
    ]);
    const [inv, ped, ops, rut] = await Promise.all([
      invRes.json(), pedRes.json(), opsRes.json(), rutRes.json()
    ]);

    allData = {
      actualizado:    ped.actualizado || inv.actualizado || ops.actualizado || '',
      ordenes_compra: ped.pedidos     || [],
      inventario_pt:  inv.invPT       || [],
      ordenes:        ops.ops         || [],
    };
    rutasData = rut;

    dot.className = 'status-dot ok';
    render();
  } catch(e) {
    dot.className = 'status-dot';
    document.getElementById('content').innerHTML =
      `<div class="loader" style="color:var(--red)">⚠ Error al cargar datos — ${e.message}</div>`;
  }
}
setInterval(fetchData, REFRESH_MS);

// ── MODO ─────────────────────────────────────────────────────────────────────
function setModo(m) {
  modo = m;
  ['btnKanban','btnLista','btnDetalle'].forEach(id => {
    document.getElementById(id).classList.toggle('active', id === 'btn'+m.charAt(0).toUpperCase()+m.slice(1));
  });
  document.getElementById('toolbar').style.display = m === 'lista' ? 'flex' : 'none';
  if (m !== 'detalle') ocSeleccionada = null;
  render();
}

function setFiltro(f, btn) {
  filtro = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLista();
}

// ── RENDER PRINCIPAL ─────────────────────────────────────────────────────────
function render() {
  if (!allData) return;
  if (modo === 'kanban') renderKanban();
  else if (modo === 'lista') renderLista();
  else if (modo === 'detalle' && ocSeleccionada) renderDetalle(ocSeleccionada);
  else renderLista();
}

// ── PROCESAR OCs ─────────────────────────────────────────────────────────────
function procesarOCs() {
  const ocs_raw = allData.ordenes_compra || [];
  const inv_pt  = allData.inventario_pt  || [];
  const ordenes = allData.ordenes        || [];

  const stockIdx = {};
  inv_pt.forEach(p => { stockIdx[p.codigo] = parseFloat(p.unds) || 0; });

  const opsIdx = {};
  ordenes.forEach(op => {
    if (op.estado === 'En Producción' || op.estado === 'Pendiente') {
      const cod = (op.sku || '').split(' ')[0];
      if (!opsIdx[cod]) opsIdx[cod] = [];
      opsIdx[cod].push(op);
    }
  });

  const ocMap = {};
  ocs_raw.forEach(linea => {
    const oc = linea.OC || linea.oc || '';
    if (!oc) return;
    const status = (linea.Status || linea.status || '').toLowerCase();
    if (status === 'entregado' || status === 'cancelado') return;

    if (!ocMap[oc]) {
      ocMap[oc] = {
        oc,
        cliente:    linea.Cliente || '—',
        codCliente: String(linea['Cod Cliente'] || linea.codCliente || ''),
        fechaEntrega: linea['Fecha de Entrega'] || linea.fechaEntrega || '',
        fechaPedido:  linea['Fecha de Pedido']  || linea.fechaPedido  || '',
        lineas: [], totalUnds:0, totalCajas:0,
        entregadasUnds:0, pendienteUnds:0, volumen:0,
      };
    }

    const totalLinea = parseFloat(linea['Total Unds'] || 0);
    const entregada  = parseFloat(linea['Cantidad Entregada'] || 0);
    const pendiente  = parseFloat(linea['Cantidad Pendiente'] || (status==='parcial'?totalLinea-entregada:totalLinea));
    const cajas      = parseFloat(linea['Total Cajas'] || 0);
    const vol        = parseFloat(linea['Peso Volumetrico'] || 0);
    const codigo     = linea.Code || linea.codigo || '';
    const stockDisp  = stockIdx[codigo] || 0;
    const opsEnProd  = opsIdx[codigo]   || [];
    const faltaStock = pendiente > stockDisp;

    let estadoLinea = 'disponible';
    if (status==='no entregado') estadoLinea='no-entregado';
    else if (status==='parcial') estadoLinea='parcial';
    else if (faltaStock && pendiente>0) estadoLinea='bloqueada';
    else if (pendiente<=0) estadoLinea='entregado';

    ocMap[oc].lineas.push({
      producto:linea.Producto||'—', codigo, status,
      totalUnds:totalLinea, entregada, pendiente,
      cajas, stockDisp, faltaStock, opsEnProd, estadoLinea, vol,
    });
    ocMap[oc].totalUnds     += totalLinea;
    ocMap[oc].totalCajas    += cajas;
    ocMap[oc].entregadasUnds+= entregada;
    ocMap[oc].pendienteUnds += pendiente;
    ocMap[oc].volumen       += vol;
  });

  const hoy = new Date(); hoy.setHours(0,0,0,0);
  return Object.values(ocMap).map(oc => {
    const lineas = oc.lineas;
    const nBloq  = lineas.filter(l=>l.estadoLinea==='bloqueada').length;
    const nParc  = lineas.filter(l=>l.estadoLinea==='parcial').length;
    const nDisp  = lineas.filter(l=>l.estadoLinea==='disponible').length;
    const nNoEnt = lineas.filter(l=>l.estadoLinea==='no-entregado').length;

    let estadoOC = 'alisto';
    if (nBloq>0) estadoOC='bloqueada';
    else if (nParc>0) estadoOC='parcial';
    else if (nDisp===lineas.length || nDisp+nNoEnt===lineas.length) estadoOC='lista';

    let diasVenc=null, claseVenc='ok';
    if (oc.fechaEntrega) {
      const fe = new Date(oc.fechaEntrega+'T00:00:00');
      diasVenc = Math.round((fe-hoy)/(864e5));
      claseVenc = diasVenc<0?'vencida':diasVenc<=3?'urgente':'ok';
    }
    const progreso = oc.totalUnds>0?Math.round((oc.entregadasUnds/oc.totalUnds)*100):0;
    return {...oc, estadoOC, nBloq, nParc, nDisp, nNoEnt, diasVenc, claseVenc, progreso};
  });
}

// ── RUTAS ────────────────────────────────────────────────────────────────────
function buildRutaIdx() {
  // cod_cliente → { id, nombre, color }
  const idx = {};
  if (!rutasData || !rutasData.rutas) return idx;
  rutasData.rutas.forEach(r => {
    (r.clientes||[]).forEach(cod => { idx[String(cod)] = r; });
  });
  return idx;
}

function getRutaDeOC(oc, rutaIdx) {
  const r = rutaIdx[oc.codCliente];
  if (r) return r;
  return {id:'R-VARIOS', nombre:'Varios', color:'#64748b'};
}

// ── DETECCIÓN DE VIAJES ───────────────────────────────────────────────────────
// Agrupa OCs de una misma ruta en "viajes" según ventana de días de entrega.
// Dentro de cada viaje, ordena por fecha de ingreso (fechaPedido).
function detectarViajes(ocs, ventanaDias=2) {
  const sinFecha = ocs.filter(o=>!o.fechaEntrega)
    .sort((a,b)=>(a.fechaPedido||'').localeCompare(b.fechaPedido||''));
  const conFecha = ocs.filter(o=>!!o.fechaEntrega)
    .sort((a,b)=>a.fechaEntrega.localeCompare(b.fechaEntrega));

  const viajes = [];
  let viaje = null;

  conFecha.forEach(oc => {
    const fe = new Date(oc.fechaEntrega+'T00:00:00');
    if (!viaje) {
      viaje = {fechaBase: fe, fechaStr: oc.fechaEntrega, ocs:[oc]};
      viajes.push(viaje);
    } else {
      const diffDias = Math.round((fe - viaje.fechaBase) / 864e5);
      if (diffDias <= ventanaDias) {
        viaje.ocs.push(oc);
      } else {
        viaje = {fechaBase: fe, fechaStr: oc.fechaEntrega, ocs:[oc]};
        viajes.push(viaje);
      }
    }
  });

  // Ordenar dentro de cada viaje por fecha de ingreso (FIFO)
  viajes.forEach(v => {
    v.ocs.sort((a,b)=>(a.fechaPedido||'').localeCompare(b.fechaPedido||''));
  });

  if (sinFecha.length) viajes.push({fechaBase:null, fechaStr:null, ocs:sinFecha});
  return viajes;
}

// ─────────────────────────────────────────────────────────────────────────────
// KANBAN RENDER
// ─────────────────────────────────────────────────────────────────────────────
function renderKanban() {
  document.getElementById('toolbar').style.display='none';
  const ocs = procesarOCs();
  const rutaIdx = buildRutaIdx();
  const ventana = (rutasData && rutasData.ventana_viaje_dias) || 2;
  const hoy = new Date(); hoy.setHours(0,0,0,0);

  // Enriquecer con ruta
  ocs.forEach(oc => { oc.ruta = getRutaDeOC(oc, rutaIdx); });

  // Separar por columna
  const cols = {
    bloqueada: ocs.filter(o=>o.estadoOC==='bloqueada'),
    alisto:    ocs.filter(o=>o.estadoOC==='alisto'||o.estadoOC==='parcial'),
    lista:     ocs.filter(o=>o.estadoOC==='lista'),
  };

  function renderColumna(ocsCol, colId, titulo, claseColor) {
    // Agrupar por ruta
    const porRuta = {};
    ocsCol.forEach(oc => {
      const rid = oc.ruta.id;
      if (!porRuta[rid]) porRuta[rid] = {ruta: oc.ruta, ocs:[]};
      porRuta[rid].ocs.push(oc);
    });

    // Ordenar rutas por fecha de entrega más próxima
    const rutasOrdenadas = Object.values(porRuta).sort((a,b) => {
      const fa = a.ocs.map(o=>o.fechaEntrega||'9999').sort()[0];
      const fb = b.ocs.map(o=>o.fechaEntrega||'9999').sort()[0];
      return fa.localeCompare(fb);
    });

    let html = rutasOrdenadas.map(grupo => {
      const viajes = detectarViajes(grupo.ocs, ventana);
      const totalCajas = grupo.ocs.reduce((s,o)=>s+o.totalCajas,0);

      const viajesHtml = viajes.map(viaje => {
        let sepHtml = '';
        if (viaje.fechaStr) {
          const fe = new Date(viaje.fechaStr+'T00:00:00');
          const dias = Math.round((fe-hoy)/864e5);
          const cls  = dias<0?'vencida':dias<=3?'urgente':'ok';
          const dTxt = dias<0?`Venció hace ${Math.abs(dias)}d`:dias===0?'HOY':dias===1?'Mañana':`En ${dias}d`;
          const fechaFmt = viaje.fechaStr.split('-').reverse().join('/');
          sepHtml = `
            <div class="viaje-sep">
              <div class="viaje-sep-line"></div>
              <span class="viaje-fecha">${fechaFmt}</span>
              <span class="viaje-badge ${cls}">${dTxt} · ${viaje.ocs.length} OC${viaje.ocs.length>1?'s':''}</span>
              <div class="viaje-sep-line"></div>
            </div>`;
        }
        const cardsHtml = viaje.ocs.map(oc => renderKOCCard(oc, hoy)).join('');
        return sepHtml + cardsHtml;
      }).join('');

      return `
        <div class="ruta-grupo">
          <div class="ruta-label">
            <div class="ruta-dot" style="background:${grupo.ruta.color}"></div>
            <span class="ruta-nombre" style="color:${grupo.ruta.color}">${grupo.ruta.nombre}</span>
            <span class="ruta-subtotal">${grupo.ocs.length} OC${grupo.ocs.length>1?'s':''} · ${totalCajas.toFixed(0)} cajas</span>
          </div>
          ${viajesHtml}
        </div>`;
    }).join('');

    return `
      <div class="kanban-col">
        <div class="kanban-col-header">
          <div class="kanban-col-title ${claseColor}">${titulo}</div>
          <div class="kanban-col-count">${ocsCol.length} órdenes de compra</div>
        </div>
        <div class="kanban-col-body">${html || '<div class="empty" style="height:120px"><div class="empty-text">Sin órdenes</div></div>'}</div>
      </div>`;
  }

  const html = `<div class="kanban-wrap">
    ${renderColumna(cols.bloqueada,'bloqueada','⛔ Bloqueadas','col-red')}
    ${renderColumna(cols.alisto,  'alisto',   '📦 En Alisto','col-amber')}
    ${renderColumna(cols.lista,   'lista',    '✅ Listas',   'col-green')}
  </div>`;

  document.getElementById('content').innerHTML = html;
}

function renderKOCCard(oc, hoy) {
  const diasTxt = oc.diasVenc===null?'':
    oc.diasVenc<0?`${Math.abs(oc.diasVenc)}d vencida`:
    oc.diasVenc===0?'Hoy':oc.diasVenc===1?'Mañana':`${oc.diasVenc}d`;

  const alertaHtml = oc.nBloq>0
    ? `<div class="koc-alerta">⚠ ${oc.nBloq} línea${oc.nBloq>1?'s':''} sin stock</div>` : '';

  return `
  <div class="koc-card ${oc.estadoOC}" onclick="abrirDetalle('${oc.oc}')">
    <div class="koc-main">
      <div class="koc-left">
        <div class="koc-num">${oc.oc}</div>
        <div class="koc-cliente">${oc.cliente}</div>
      </div>
      <div class="koc-right">
        <div class="koc-unds">${Math.round(oc.pendienteUnds).toLocaleString()}</div>
        <div class="koc-unds-label">unds pend.</div>
      </div>
    </div>
    <div class="koc-meta">
      <span class="koc-fecha ${oc.claseVenc}">${oc.fechaEntrega||'—'}</span>
      ${diasTxt?`<span class="koc-dias ${oc.claseVenc}">${diasTxt}</span>`:''}
      <span class="koc-cajas">${oc.totalCajas.toFixed(0)} cajas · ${oc.lineas.length} líneas</span>
    </div>
    ${alertaHtml}
  </div>`;
}

// ── LISTA ─────────────────────────────────────────────────────────────────────
function renderLista() {
  if (!allData) return;
  const ocs = procesarOCs();
  const busq=(document.getElementById('searchBox').value||'').toLowerCase();
  let filtradas = ocs.filter(oc=>{
    if(filtro!=='todos'&&oc.estadoOC!==filtro) return false;
    if(busq&&!oc.oc.toLowerCase().includes(busq)&&!oc.cliente.toLowerCase().includes(busq)) return false;
    return true;
  }).sort((a,b)=>{
    const ord={bloqueada:0,parcial:1,alisto:2,lista:3};
    if(ord[a.estadoOC]!==ord[b.estadoOC]) return ord[a.estadoOC]-ord[b.estadoOC];
    return (a.fechaEntrega||'').localeCompare(b.fechaEntrega||'');
  });

  document.getElementById('toolbarCount').textContent=`${filtradas.length} de ${ocs.length} OCs`;
  if(!filtradas.length){
    document.getElementById('content').innerHTML=`<div class="list-wrap"><div class="empty"><div class="empty-icon">📦</div><div class="empty-text">No hay OCs para este filtro</div></div></div>`;
    return;
  }
  document.getElementById('content').innerHTML=`<div class="list-wrap"><div class="oc-grid">${filtradas.map(renderOCCard).join('')}</div></div>`;
}

function renderOCCard(oc) {
  const pbClass=oc.estadoOC==='lista'?'pb-green':oc.estadoOC==='parcial'?'pb-purple':oc.estadoOC==='bloqueada'?'pb-red':'pb-amber';
  const badgeClass=oc.estadoOC==='lista'?'badge-lista':oc.estadoOC==='parcial'?'badge-parcial':oc.estadoOC==='bloqueada'?'badge-bloqueada':'badge-alisto';
  const badgeText=oc.estadoOC==='lista'?'Lista':oc.estadoOC==='parcial'?'Parcial':oc.estadoOC==='bloqueada'?'Bloqueada':'En proceso';
  const diasTxt=oc.diasVenc===null?'':oc.diasVenc<0?`${Math.abs(oc.diasVenc)}d vencida`:oc.diasVenc===0?'Hoy':`${oc.diasVenc}d restantes`;
  const alertaHtml=oc.nBloq>0?`<div class="oc-alerta">⚠ ${oc.nBloq} línea${oc.nBloq>1?'s':''} bloqueada${oc.nBloq>1?'s':''} por producción</div>`:'';
  return `
  <div class="oc-card ${oc.estadoOC}" onclick="abrirDetalle('${oc.oc}')">
    <div class="oc-card-header">
      <div style="min-width:0"><div class="oc-num">${oc.oc}</div><div class="oc-cliente">${oc.cliente}</div></div>
      <span class="oc-status-badge ${badgeClass}">${badgeText}</span>
    </div>
    <div class="oc-fecha-row">
      <span class="oc-fecha-label">Entrega:</span>
      <span class="oc-fecha-val ${oc.claseVenc}">${oc.fechaEntrega||'—'}</span>
      ${diasTxt?`<span class="dias-badge ${oc.claseVenc}">${diasTxt}</span>`:''}
      <span style="margin-left:auto;font-size:11px;color:var(--text-dim)">${oc.lineas.length} líneas · ${oc.volumen.toFixed(2)} m³</span>
    </div>
    ${alertaHtml}
    <div class="oc-progress-wrap">
      <div class="oc-progress-labels">
        <span class="oc-progress-pct" style="color:${oc.estadoOC==='lista'?'var(--green)':oc.estadoOC==='bloqueada'?'var(--red)':'var(--text-mid)'}">${oc.pendienteUnds.toLocaleString()} unds pendientes</span>
        <span class="oc-progress-nums">${oc.totalCajas.toFixed(0)} cajas</span>
      </div>
      <div class="progress-track"><div class="progress-bar ${pbClass}" style="width:${oc.progreso}%"></div></div>
    </div>
    <div class="oc-lineas-row">
      ${oc.nDisp>0?`<span class="oc-linea-stat"><span class="dot-stat" style="background:var(--green)"></span>${oc.nDisp} listas</span>`:''}
      ${oc.nParc>0?`<span class="oc-linea-stat"><span class="dot-stat" style="background:var(--purple)"></span>${oc.nParc} parciales</span>`:''}
      ${oc.nBloq>0?`<span class="oc-linea-stat"><span class="dot-stat" style="background:var(--red)"></span>${oc.nBloq} bloqueadas</span>`:''}
    </div>
  </div>`;
}

// ── DETALLE ───────────────────────────────────────────────────────────────────
function abrirDetalle(ocNum) {
  ocSeleccionada = ocNum;
  modo = 'detalle';
  ['btnKanban','btnLista','btnDetalle'].forEach(id=>document.getElementById(id).classList.remove('active'));
  const btn=document.getElementById('btnDetalle');
  btn.classList.add('active');
  btn.disabled=false;
  document.getElementById('toolbar').style.display='none';
  renderDetalle(ocNum);
}

function renderDetalle(ocNum) {
  const ocs = procesarOCs();
  const oc  = ocs.find(o=>o.oc===ocNum);
  if (!oc) { setModo('kanban'); return; }

  const diasTxt = oc.diasVenc===null?'':oc.diasVenc<0?`· Vencida hace ${Math.abs(oc.diasVenc)} días`:oc.diasVenc===0?'· Entrega HOY':`· ${oc.diasVenc} días para entrega`;
  const lineasHtml = oc.lineas.map(l=>{
    const cls=l.estadoLinea==='bloqueada'?'bloqueada':l.estadoLinea==='disponible'?'disponible':l.estadoLinea==='parcial'?'parcial':'';
    const badgeTxt=l.estadoLinea==='bloqueada'?'Sin stock':l.estadoLinea==='disponible'?'Disponible':l.estadoLinea==='parcial'?'Parcial':'—';
    const badgeStyle=l.estadoLinea==='bloqueada'?'background:rgba(231,76,60,.15);color:var(--red);':l.estadoLinea==='disponible'?'background:rgba(46,204,113,.1);color:var(--green);':'background:rgba(155,89,182,.15);color:var(--purple);';
    const alertaOp=l.faltaStock?`<div class="linea-alerta">⚠ Falta stock — Disponible: ${l.stockDisp.toLocaleString()} / Pedido: ${l.pendiente.toLocaleString()}${l.opsEnProd.length?` · ${l.opsEnProd.length} OP en producción`:' · Sin OP activa para este producto'}</div>`:'';
    return `<div class="linea-card ${cls}">
      <div>
        <div class="linea-producto">${l.producto}</div>
        <div class="linea-codigo">Cód: ${l.codigo||'—'}</div>
        <div class="linea-stats">
          <div class="linea-stat">Pedido <span>${l.totalUnds.toLocaleString()}</span></div>
          <div class="linea-stat">Stock <span class="${l.faltaStock?'red':'green'}">${l.stockDisp.toLocaleString()}</span></div>
          <div class="linea-stat">Pendiente <span class="${l.pendiente>0?'red':''}">${l.pendiente.toLocaleString()}</span></div>
          <div class="linea-stat">Cajas <span>${l.cajas.toFixed(1)}</span></div>
        </div>
        ${alertaOp}
      </div>
      <span class="linea-status-badge" style="${badgeStyle}">${badgeTxt}</span>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML=`
  <div class="detail-wrap">
    <div class="detail-back">
      <button class="back-btn" onclick="setModo('kanban')">← Volver</button>
      <span class="detail-oc-num">${oc.oc}</span>
      <span class="detail-cliente">${oc.cliente}</span>
      <span class="detail-venc ${oc.claseVenc}">${diasTxt}</span>
    </div>
    <div class="detail-summary">
      <div class="summary-card"><div class="summary-label">Unidades pendientes</div><div class="summary-val ${oc.pendienteUnds>0?'red':''}">${Math.round(oc.pendienteUnds).toLocaleString()}</div></div>
      <div class="summary-card"><div class="summary-label">Total cajas</div><div class="summary-val">${oc.totalCajas.toFixed(0)}</div></div>
      <div class="summary-card"><div class="summary-label">Volumen m³</div><div class="summary-val">${oc.volumen.toFixed(2)}</div></div>
      <div class="summary-card"><div class="summary-label">Líneas (${oc.nBloq} bloq)</div><div class="summary-val ${oc.nBloq>0?'red':''}">${oc.lineas.length}</div></div>
    </div>
    <div class="lineas-list">${lineasHtml}</div>
  </div>`;
}

fetchData();
